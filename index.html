<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Focus — Daily Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="mydata.js" onerror="window.MYDATA=null"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #6C63FF;
    --accent-soft: rgba(108,99,255,0.10);
    --accent-mid: rgba(108,99,255,0.22);
    --bg: #F7F6FB;
    --surface: #FFFFFF;
    --surface2: #F0EFF8;
    --border: rgba(0,0,0,0.07);
    --border-strong: rgba(0,0,0,0.13);
    --text: #1A1830;
    --text2: #5C5880;
    --text3: #9A97B8;
    --success: #22C98A;
    --danger: #FF5E5E;
    --warn: #FFB74D;
    --radius: 18px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(108,99,255,0.08);
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F0E1A;
      --surface: #1A1830;
      --surface2: #221F38;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text: #EBE9FF;
      --text2: #9E9AC4;
      --text3: #5C5880;
      --accent-soft: rgba(108,99,255,0.18);
      --accent-mid: rgba(108,99,255,0.32);
      --shadow: 0 4px 32px rgba(0,0,0,0.35);
    }
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar Styles */
  .sidebar {
    width: 196px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 22px 10px 22px;
    gap: 3px;
    z-index: 20;
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 8px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: white; }
  .logo-name {
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.5px; color: var(--text);
    white-space: nowrap;
  }
  .logo-name span { color: var(--accent); }
  .sidebar-date {
    font-size: 11px; color: var(--text3);
    padding: 0 8px; margin-bottom: 8px; line-height: 1.4;
  }
  .sidebar-spacer { flex: 1; }

  /* Tab Navigation */
  .tab {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; font-weight: 500;
    color: var(--text2);
    transition: var(--transition);
    width: 100%; text-align: left;
    white-space: nowrap;
  }
  .tab svg { width: 17px; height: 17px; flex-shrink: 0; }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active {
    background: var(--accent); color: white;
    box-shadow: 0 2px 14px rgba(108,99,255,0.28);
  }
  .tab .badge {
    min-width: 18px; height: 18px;
    background: rgba(255,255,255,0.28);
    border-radius: 9px; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px; margin-left: auto;
  }
  .tab:not(.active) .badge { background: var(--accent-soft); color: var(--accent); }

  /* Main Content Area */
  .content {
    flex: 1; min-width: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 28px 28px 40px;
    background: var(--bg);
  }
  .content.music-active {
    padding: 0; overflow: hidden;
  }

  .panel { display: none; animation: fadeIn 0.22s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

  /* Music View */
  #panel-music {
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  #panel-music.active { display: flex; flex-direction: column; }

  .music-stage-bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, var(--accent-soft) 0%, transparent 70%);
    transition: background 0.8s ease;
    pointer-events: none;
  }

  .music-stage-canvas-host {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
  }

  .music-stage-center {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 62%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
    gap: 18px;
  }

  .music-cover-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .music-cover {
    width: 160px; height: 160px;
    border-radius: 20px;
    background: var(--accent-soft);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.30), 0 0 0 1px var(--border);
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
    transform-origin: center center;
    will-change: transform;
  }
  .music-cover img { width: 100%; height: 100%; object-fit: cover; }
  .cover-placeholder { font-size: 58px; }

  .music-info { text-align: center; pointer-events: none; }
  .music-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; text-shadow: 0 1px 12px rgba(0,0,0,0.12); }
  .music-artist { font-size: 13px; color: var(--text3); }
  .music-no-src { font-size: 12px; color: var(--warn); margin-top: 4px; }

  /* Player Controls */
  .music-dock {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 20px 32px 28px;
    background: linear-gradient(to top, var(--surface) 60%, transparent 100%);
    backdrop-filter: blur(0px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .music-seek-wrap { margin-bottom: 2px; }
  .music-seek {
    width: 100%; height: 4px;
    -webkit-appearance: none; appearance: none;
    border-radius: 2px; outline: none; cursor: pointer;
    margin-bottom: 4px;
    background: linear-gradient(to right, var(--accent) 0%, var(--surface2) 0%);
  }
  .music-seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .seek-times {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .music-controls {
    display: flex; align-items: center;
    justify-content: center; gap: 12px;
  }
  .mc-btn {
    border: none; background: transparent; cursor: pointer;
    color: var(--text2); width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: var(--transition); font-size: 20px;
  }
  .mc-btn:hover { background: var(--surface2); color: var(--text); }
  .mc-btn-main {
    width: 54px; height: 54px; background: var(--accent);
    color: white; box-shadow: 0 3px 16px rgba(108,99,255,0.30); font-size: 22px;
  }
  .mc-btn-main:hover { filter: brightness(1.1); transform: scale(1.04); }
  .mc-btn.active { color: var(--accent); }

  .dock-bottom-row {
    display: flex; align-items: center; gap: 12px;
  }
  .volume-row {
    display: flex; align-items: center; gap: 8px; flex: 1;
  }
  .vol-icon { font-size: 15px; color: var(--text3); }
  .music-vol {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(to right, var(--accent) 70%, var(--surface2) 70%);
  }
  .music-vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }

  .viz-mode-row {
    display: flex; gap: 5px;
  }
  .viz-mode-btn {
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500; color: var(--text2);
    cursor: pointer; transition: var(--transition);
  }
  .viz-mode-btn.active {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
  }
  .viz-mode-btn:hover:not(.active) { background: var(--surface2); }

  .music-playlist-toggle {
    width: 34px; height: 34px; border-radius: 10px;
    border: 1px solid var(--border-strong); background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text2); transition: var(--transition); flex-shrink: 0;
  }
  .music-playlist-toggle:hover { background: var(--surface); color: var(--text); }
  .music-playlist-toggle.open { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  /* Playlist View */
  .playlist-drawer {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    max-height: 50vh;
    overflow-y: auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    transform: translateY(100%);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.25s ease;
    z-index: 6;
    pointer-events: none;
    will-change: transform;
  }
  .playlist-drawer.open {
    transform: translateY(0%);
    opacity: 1;
    pointer-events: auto;
  }
  .playlist-drawer::-webkit-scrollbar { width: 4px; }
  .playlist-drawer::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .playlist-drawer-header {
    position: sticky; top: 0;
    padding: 12px 16px 10px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
    z-index: 1;
  }
  .playlist-drawer-header-top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .playlist-search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: var(--transition);
  }
  .playlist-search::placeholder { color: var(--text3); }
  .playlist-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .playlist-search-wrap {
    position: relative;
  }
  .playlist-search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none; font-size: 13px;
  }
  .playlist-no-results {
    padding: 24px; text-align: center; color: var(--text3); font-size: 13px;
  }

  .playlist-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: var(--transition);
  }
  .playlist-item:last-child { border-bottom: none; }
  .playlist-item:hover { background: var(--accent-soft); }
  .playlist-item.playing { background: var(--accent-soft); }
  .pl-num { width: 22px; font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; text-align: center; }
  .pl-num.playing-dot::after { content: '▶'; font-size: 10px; color: var(--accent); }
  .pl-info { flex: 1; min-width: 0; }
  .pl-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-artist { font-size: 11px; color: var(--text3); }
  .pl-nosrc { font-size: 10px; color: var(--warn); }
  .no-tracks-msg { padding: 20px; text-align: center; color: var(--text3); font-size: 13px; }

  /* Generic Card Styles */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
  }
  .card + .card { margin-top: 16px; }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Tasks Section */
  .task-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .task-input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: var(--transition);
  }
  .task-input-row input::placeholder { color: var(--text3); }
  .task-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--danger); }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .filter-btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: var(--transition);
  }
  .filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    transition: var(--transition);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: none; } }
  .task-item:hover { border-color: var(--border-strong); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    transition: var(--transition);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    appearance: none; -webkit-appearance: none;
  }
  .task-check:checked {
    background: var(--success);
    border-color: var(--success);
  }
  .task-check:checked::after {
    content: '';
    width: 5px; height: 9px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }

  .task-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    cursor: pointer;
    word-break: break-word;
  }
  .task-text[contenteditable="true"] {
    outline: none;
    border-bottom: 1px dashed var(--accent);
  }

  .task-priority {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
  }
  .p-low { background: var(--text3); }
  .p-mid { background: var(--warn); }
  .p-high { background: var(--danger); }

  .task-del {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .task-del:hover { background: rgba(255,94,94,0.12); color: var(--danger); }

  .task-stats {
    display: flex;
    gap: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }
  .task-stat { font-size: 12px; color: var(--text3); }
  .task-stat span { color: var(--text); font-weight: 600; }

  /* Progress UI */
  .progress-wrap { margin-bottom: 16px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #A78BFA);
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Stopwatch UI */
  .sw-display {
    text-align: center;
    padding: 32px 0 24px;
    font-family: 'DM Mono', monospace;
  }
  .sw-time {
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -2px;
    color: var(--text);
    line-height: 1;
  }
  .sw-ms {
    font-size: 28px;
    color: var(--text3);
    vertical-align: super;
    font-size: 32px;
  }
  .sw-label {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sw-controls {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .sw-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .sw-btn-main {
    width: 80px; height: 80px;
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    font-size: 26px;
  }
  .sw-btn-main:hover { transform: scale(1.06); }
  .sw-btn-sec { background: var(--surface2); color: var(--text); }
  .sw-btn-sec:hover { background: var(--border-strong); }

  .laps-list {
    max-height: 200px;
    overflow-y: auto;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
  }
  .laps-list::-webkit-scrollbar { width: 4px; }
  .laps-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .lap-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .lap-item:last-child { border-bottom: none; }
  .lap-num { color: var(--text3); font-size: 11px; }
  .lap-time { color: var(--text); }
  .lap-delta { color: var(--text3); font-size: 12px; }
  .lap-best { color: var(--success); }
  .lap-worst { color: var(--danger); }

  /* Reminders UI */
  .rem-form {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    margin-bottom: 16px;
  }
  .rem-form input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: var(--transition);
  }
  .rem-form input[type="text"]::placeholder { color: var(--text3); }
  .rem-form input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .rem-form input[type="time"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: var(--transition);
    cursor: pointer;
  }
  .rem-form input[type="time"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .rem-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .rem-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    transition: var(--transition);
    animation: slideIn 0.2s ease;
  }
  .rem-item:hover { border-color: var(--border-strong); }
  .rem-item.fired {
    border-left: 3px solid var(--warn);
    background: rgba(255,183,77,0.08);
  }
  .rem-time {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    min-width: 54px;
  }
  .rem-text { flex: 1; font-size: 14px; color: var(--text); }
  .rem-status { font-size: 11px; color: var(--text3); }
  .rem-del {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .rem-del:hover { background: rgba(255,94,94,0.12); color: var(--danger); }

  .notif-banner {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: white;
    padding: 13px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(108,99,255,0.4);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    z-index: 1000;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .notif-banner.show { transform: translateX(-50%) translateY(0); }
  .notif-bell { font-size: 18px; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 14px; }

  /* Responsive Queries */
  @media (max-width: 1199px) {
    .sidebar { width: 172px; }
    .content { padding: 22px 22px 36px; }
  }

  @media (max-width: 899px) {
    .sidebar {
      width: 62px;
      padding: 18px 8px;
      align-items: center;

    .tab span { display: block; font-size: 10px; font-weight: 500; }
    .tab.active { box-shadow: none; }
    .tab .badge {

    }

    .content {

    #panel-music {
      height: 100%;
      min-height: 0;
    }
    #panel-music.active { display: flex; flex-direction: column; }

    .card { padding: 16px; border-radius: 14px; }
    .card + .card { margin-top: 12px; }

    .rem-form { grid-template-columns: 1fr; }

    .music-cover { width: 110px; height: 110px; border-radius: 16px; }

    .music-dock {
      padding: 12px 16px env(safe-area-inset-bottom, 14px);
      gap: 10px;
    }
    .music-controls { gap: 8px; }
    .mc-btn { width: 34px; height: 34px; font-size: 17px; }
    .mc-btn-main { width: 48px; height: 48px; font-size: 20px; }

    .viz-mode-row { gap: 4px; }

    .playlist-drawer { max-height: 52vh; }

  @media (max-width: 380px) {

<script>
/* Persistence Utils */
const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem('focus_'+k)); } catch(e){ return null; } },
  set(k,v) { try { localStorage.setItem('focus_'+k, JSON.stringify(v)); } catch(e){} }
};

/* Settings Init */
const S = window.MYDATA?.SETTINGS || {};
if (S.accentColor) {
  document.documentElement.style.setProperty('--accent', S.accentColor);
  document.documentElement.style.setProperty('--accent-soft', S.accentColor + '1A');
  document.documentElement.style.setProperty('--accent-mid', S.accentColor + '38');
}

/* Date Display */
function updateDate() {
  const d = new Date();
  const el = document.getElementById('headerDate');
  if (el) el.textContent = d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
}
updateDate();

/* Navigation Logic */
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  const content = document.getElementById('mainContent');
  if (name === 'music') {
    content.classList.add('music-active');
    requestAnimationFrame(() => {
      vizMountCanvas();
      setTimeout(vizMountCanvas, 80);
    });
  } else {
    content.classList.remove('music-active');
  }
}

/* Tasks Module */
let tasks = LS.get('tasks') || [];
let taskFilter = 'all';

if (!LS.get('tasks_init') && window.MYDATA?.DEFAULT_TASKS) {
  tasks = window.MYDATA.DEFAULT_TASKS.map((t,i) => ({
    id: Date.now()+i, text: t, done: false, priority: 'low',
    created: new Date().toISOString()
  }));
  LS.set('tasks', tasks);
  LS.set('tasks_init', true);
}

function saveTasks() { LS.set('tasks', tasks); }

function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  tasks.unshift({ id: Date.now(), text, done: false, priority: 'mid', created: new Date().toISOString() });
  saveTasks();
  renderTasks();
  inp.value = '';
  inp.focus();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; t.doneAt = t.done ? new Date().toISOString() : null; }
  saveTasks();
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

function cyclePriority(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const cycle = { low: 'mid', mid: 'high', high: 'low' };
  t.priority = cycle[t.priority];
  saveTasks();
  renderTasks();
}

function setFilter(f, btn) {
  taskFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  saveTasks();
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById('taskList');
  let filtered = tasks;
  if (taskFilter === 'active') filtered = tasks.filter(t => !t.done);
  else if (taskFilter === 'done') filtered = tasks.filter(t => t.done);
  else if (taskFilter === 'high') filtered = tasks.filter(t => t.priority === 'high' && !t.done);

  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;
  document.getElementById('taskBadge').textContent = tasks.filter(t => !t.done).length;

  const prioLabel = {low:'low', mid:'mid', high:'high'};
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">✓</div><p>' +
      (taskFilter === 'done' ? 'No completed tasks yet.' : 'Nothing here! Add a task above.') + '</p></div>';
  } else {
    list.innerHTML = filtered.map(t => `
      <li class="task-item ${t.done ? 'done' : ''}">
        <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
        <div class="task-priority p-${t.priority}" title="Priority: ${prioLabel[t.priority]}" onclick="cycleTask(${t.id})"></div>
        <div class="task-text" onclick="startEdit(this,${t.id})">${escHtml(t.text)}</div>
        <button class="task-del" onclick="deleteTask(${t.id})">×</button>
      </li>`).join('');
  }

  const stats = document.getElementById('taskStats');
  stats.innerHTML = `
    <div class="task-stat">Total <span>${total}</span></div>
    <div class="task-stat">Active <span>${total - done}</span></div>
    <div class="task-stat">Done <span>${done}</span></div>
    <div class="task-stat" style="color:var(--danger)">High <span>${tasks.filter(t=>t.priority==='high'&&!t.done).length}</span></div>
  `;
}

function cycleTask(id) { cyclePriority(id); }

function startEdit(el, id) {
  el.contentEditable = true;
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  el.onblur = () => {
    el.contentEditable = false;
    const t = tasks.find(t => t.id === id);
    if (t) { t.text = el.textContent.trim() || t.text; }
    saveTasks();
    renderTasks();
  };
  el.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } };
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderTasks();

/* Timer Logic */
let swRunning = false, swElapsed = 0, swStart = 0, swInterval = null;
let laps = [], lapStart = 0;

function toggleSW() {
  if (swRunning) {
    clearInterval(swInterval);
    swElapsed += Date.now() - swStart;
    swRunning = false;
    document.getElementById('swPlayBtn').textContent = '▶';
    document.getElementById('swLabel').textContent = 'Paused';
  } else {
    swStart = Date.now();
    swRunning = true;
    if (!lapStart) lapStart = swStart;
    document.getElementById('swPlayBtn').textContent = '⏸';
    document.getElementById('swLabel').textContent = 'Running';
    swInterval = setInterval(tickSW, 31);
  }
}

function tickSW() {
  const total = swElapsed + (Date.now() - swStart);
  const ms = Math.floor((total % 1000) / 10);
  const s = Math.floor(total / 1000) % 60;
  const m = Math.floor(total / 60000) % 60;
  const h = Math.floor(total / 3600000);
  document.getElementById('swH').textContent = pad(h);
  document.getElementById('swM').textContent = pad(m);
  document.getElementById('swS').textContent = pad(s);
  document.getElementById('swMs').textContent = pad(ms);
}

function resetSW() {
  clearInterval(swInterval);
  swRunning = false; swElapsed = 0; swStart = 0; lapStart = 0; laps = [];
  ['swH','swM','swS','swMs'].forEach(id => document.getElementById(id).textContent = '00');
  document.getElementById('swPlayBtn').textContent = '▶';
  document.getElementById('swLabel').textContent = 'Ready';
  document.getElementById('lapsWrap').style.display = 'none';
  document.getElementById('lapsList').innerHTML = '';
}

function lapSW() {
  if (!swRunning) return;
  const total = swElapsed + (Date.now() - swStart);
  const lapTime = total - (laps.length ? laps.reduce((a,l) => a + l.raw, 0) : 0);
  laps.push({ num: laps.length + 1, total, lapTime, raw: lapTime });
  renderLaps();
  document.getElementById('lapsWrap').style.display = 'block';
}

function renderLaps() {
  const rawTimes = laps.map(l => l.lapTime);
  const best = Math.min(...rawTimes);
  const worst = Math.max(...rawTimes);
  document.getElementById('lapCount').textContent = laps.length + ' lap' + (laps.length !== 1 ? 's' : '');
  document.getElementById('lapsList').innerHTML = [...laps].reverse().map(l => {
    const cls = rawTimes.length > 1 ? (l.lapTime === best ? 'lap-best' : l.lapTime === worst ? 'lap-worst' : '') : '';
    return `<div class="lap-item">
      <span class="lap-num">Lap ${l.num}</span>
      <span class="lap-time">${fmtTime(l.total)}</span>
      <span class="lap-delta ${cls}">+${fmtTime(l.lapTime)}</span>
    </div>`;
  }).join('');
}

function fmtTime(ms) {
  const cs = Math.floor((ms % 1000) / 10);
  const s = Math.floor(ms / 1000) % 60;
  const m = Math.floor(ms / 60000) % 60;
  const h = Math.floor(ms / 3600000);
  return (h ? pad(h)+':' : '') + pad(m) + ':' + pad(s) + '.' + pad(cs);
}

function pad(n) { return String(n).padStart(2,'0'); }

/* Audio Core */
const audio = document.getElementById('audioPlayer');
let tracks = [];
let currentTrack = 0;
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;

function initMusic() {
  const md = window.MYDATA;
  if (md && md.MUSIC_TRACKS && md.MUSIC_TRACKS.length) {
    tracks = md.MUSIC_TRACKS;
  }
  const savedIdx = LS.get('music_track') || 0;
  currentTrack = Math.min(savedIdx, tracks.length - 1);
  isShuffle = LS.get('music_shuffle') || false;
  isRepeat = LS.get('music_repeat') || false;
  audio.volume = (LS.get('music_vol') || 70) / 100;
  document.getElementById('volBar').value = (LS.get('music_vol') || 70);
  updateShuffleBtn();
  updateRepeatBtn();
  renderPlaylist();
  if (tracks.length) loadTrack(currentTrack, false);
  else {
    document.getElementById('musicTitle').textContent = 'Add tracks in mydata.js';
    document.getElementById('musicArtist').textContent = '—';
  }
  document.getElementById('trackCount').textContent = tracks.length + ' track' + (tracks.length !== 1 ? 's' : '');
}

function loadTrack(idx, play) {
  currentTrack = idx;
  LS.set('music_track', idx);
  const t = tracks[idx];
  document.getElementById('musicTitle').textContent = t.title || 'Untitled';
  document.getElementById('musicArtist').textContent = t.artist || '—';
  const noSrc = !t.src;
  document.getElementById('musicNoSrc').style.display = noSrc ? '' : 'none';
  const cover = document.getElementById('musicCover');
  if (t.cover) {
    const imgEl = new Image();
    imgEl.crossOrigin = 'anonymous';
    imgEl.onload = () => extractAccentFromCover(imgEl);
    imgEl.onerror = () => applyAccent(_originalAccent);
    imgEl.src = t.cover;
    cover.innerHTML = `<img src="${t.cover}" alt="Cover" onerror="this.parentNode.innerHTML='<div class=cover-placeholder>🎵</div>'">`;
  } else {
    cover.innerHTML = '<div class="cover-placeholder">🎵</div>';
    applyAccent(_originalAccent);
  }
  if (t.src) {
    audio.crossOrigin = "anonymous";
    audio.src = t.src;
    audio.load();
  } else {
    audio.src = '';
  }
  if (play && t.src) { audio.play().catch(()=>{}); isPlaying = true; }
  else { isPlaying = false; }
  updatePlayBtn();
  renderPlaylist();
  requestAnimationFrame(vizMountCanvas);
}

/* Audio Visualizer */
let _vizActx     = null;
let _vizAnalyser = null;
let _vizSource   = null;
let _vizRaf      = null;
let _vizCanvas   = null;
let _vizCtx      = null;

const VIZ_BARS       = 128;
const VIZ_FFT        = 2048;
const VIZ_SMOOTH     = 0.8;
const VIZ_INNER_R    = 0.42;
const VIZ_MAX_H      = 0.22;
const VIZ_BAR_DEG    = 2.4;
const VIZ_IDLE_ALPHA = 0.18;
const VIZ_PEAK_DECAY = 0.975;

const _peakHeights  = new Float32Array(VIZ_BARS);
const _particles    = [];
const _beatHistory  = new Float32Array(43);
let   _beatIdx      = 0;
let   _isBeat       = false;
let   _beatPulse    = 0;
let   _ringRotation = 0;
let   _idlePhase    = 0;
let   _vizMode      = 'circular';
const _stars        = [];

function setVizMode(mode, btn) {
  _vizMode = mode;
  document.querySelectorAll('.viz-mode-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  _peakHeights.fill(0);
  _particles.length = 0;
}

function vizHexToRgba(hex, alpha) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.substring(0,2), 16);
  const g = parseInt(hex.substring(2,4), 16);
  const b = parseInt(hex.substring(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function vizHexRGB(hex) {
  hex = hex.replace('#','');
  if (hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  return [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];
}

function vizLerpColor(c1, c2, t, alpha) {
  const r = Math.round(c1[0] + (c2[0]-c1[0])*t);
  const g = Math.round(c1[1] + (c2[1]-c1[1])*t);
  const b = Math.round(c1[2] + (c2[2]-c1[2])*t);
  return `rgba(${r},${g},${b},${alpha})`;
}

const _originalAccent = (window.MYDATA?.SETTINGS?.accentColor) || '#6C63FF';

function extractAccentFromCover(imgEl) {
  try {
    const sz  = 12;
    const oc  = document.createElement('canvas');
    oc.width  = sz; oc.height = sz;
    const octx = oc.getContext('2d');
    octx.drawImage(imgEl, 0, 0, sz, sz);
    const d = octx.getImageData(0, 0, sz, sz).data;
    let r = 0, g = 0, b = 0, n = d.length / 4;
    for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
    r = Math.round(r/n); g = Math.round(g/n); b = Math.round(b/n);
    const avg = (r+g+b)/3, sat = 1.7;
    r = Math.min(255, Math.round(avg+(r-avg)*sat));
    g = Math.min(255, Math.round(avg+(g-avg)*sat));
    b = Math.min(255, Math.round(avg+(b-avg)*sat));
    const bright = (r*299+g*587+b*114)/1000;
    if (bright < 60) { r=Math.min(255,r+60); g=Math.min(255,g+60); b=Math.min(255,b+60); }
    const hex = '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
    applyAccent(hex);
    _peakHeights.fill(0);
  } catch(e) {}
}

function applyAccent(hex) {
  const root = document.documentElement;
  root.style.setProperty('--accent', hex);
  root.style.setProperty('--accent-soft', hex+'1A');
  root.style.setProperty('--accent-mid',  hex+'38');
  const vb = document.getElementById('volBar');
  if (vb) vb.style.background =
    `linear-gradient(to right, ${hex} ${vb.value}%, var(--surface2) ${vb.value}%)`;
}

function vizMountCanvas() {
  if (_vizCanvas && _vizCanvas.parentNode) _vizCanvas.parentNode.removeChild(_vizCanvas);
  const host  = document.getElementById('vizHost');
  const panel = document.getElementById('panel-music');
  const cover = document.getElementById('musicCover');
  if (!host || !panel || !cover) return;

  const W = panel.offsetWidth  || (window.innerWidth  - (document.querySelector('.sidebar')?.offsetWidth || 196));
  const H = panel.offsetHeight || window.innerHeight;
  if (W < 10 || H < 10) return;

  _vizCanvas = document.createElement('canvas');
  _vizCanvas.width  = W;
  _vizCanvas.height = H;
  Object.assign(_vizCanvas.style, {
    position: 'absolute', inset: '0',
    width: '100%', height: '100%',
    pointerEvents: 'none',
  });
  host.innerHTML = '';
  host.appendChild(_vizCanvas);
  _vizCtx = _vizCanvas.getContext('2d');

  if (_stars.length === 0) {
    for (let i = 0; i < 220; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist  = 0.15 + Math.random() * 0.85;
      _stars.push({ angle, dist, size: 0.4 + Math.random()*1.8,
        twinkle: Math.random()*Math.PI*2, speed: 0.0003+Math.random()*0.0007 });
    }
  }

  if (!_vizRaf) vizDraw();
}

function vizInitAudio() {
  if (_vizActx) return;
  try {
    audio.crossOrigin = "anonymous";
    _vizActx     = new (window.AudioContext || window.webkitAudioContext)();
    _vizAnalyser = _vizActx.createAnalyser();
    _vizAnalyser.fftSize = VIZ_FFT;
    _vizAnalyser.smoothingTimeConstant = VIZ_SMOOTH;
    _vizSource   = _vizActx.createMediaElementSource(audio);
    _vizSource.connect(_vizAnalyser);
    _vizAnalyser.connect(_vizActx.destination);
  } catch(e) {
    _vizActx = null;
  }
}

async function vizStart() {
  if (_vizActx) try { await _vizActx.resume(); } catch(e) {}
  if (!_vizCanvas) vizMountCanvas();
  cancelAnimationFrame(_vizRaf);
  _vizRaf = null;
  vizDraw();
}

function vizDraw() {
  if (!_vizCanvas || !_vizCtx) return;
  const W = _vizCanvas.width;
  const H = _vizCanvas.height;
  const cover = document.getElementById('musicCover');
  const panel = document.getElementById('panel-music');
  let cx = W / 2, cy = H * 0.34;
  if (cover && panel) {
    const cRect = cover.getBoundingClientRect();
    const pRect = panel.getBoundingClientRect();
    cx = cRect.left + cRect.width  / 2 - pRect.left;
    cy = cRect.top  + cRect.height / 2 - pRect.top;
  }

  const coverRadius = (cover ? cover.offsetWidth : 160) / 2;
  const innerR = coverRadius * 1.15;
  const maxH   = Math.min(W, H) * VIZ_MAX_H;

  const dataArr = new Uint8Array(_vizAnalyser ? _vizAnalyser.frequencyBinCount : VIZ_BARS * 2);
  if (_vizAnalyser) _vizAnalyser.getByteFrequencyData(dataArr);

  const waveArr = new Uint8Array(_vizAnalyser ? _vizAnalyser.fftSize : 2048);
  if (_vizAnalyser) _vizAnalyser.getByteTimeDomainData(waveArr);

  const binStep      = Math.max(1, Math.floor((dataArr.length * 0.75) / VIZ_BARS));
  const accentRaw    = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6C63FF';
  const accentRGB    = vizHexRGB(accentRaw);
  const hiRGB        = [Math.max(0,255-accentRGB[0]), accentRGB[2], accentRGB[1]];

  let bassEnergy = 0;
  for (let b = 0; b < 6; b++) bassEnergy += (dataArr[b] || 0);
  bassEnergy /= 6;
  _beatHistory[_beatIdx % _beatHistory.length] = bassEnergy;
  _beatIdx++;
  let beatAvg = 0;
  for (let i = 0; i < _beatHistory.length; i++) beatAvg += _beatHistory[i];
  beatAvg /= _beatHistory.length;
  const prevBeat = _isBeat;
  _isBeat = isPlaying && bassEnergy > beatAvg * 1.42 && bassEnergy > 28;
  if (_isBeat && !prevBeat) _beatPulse = 1.0;
  _beatPulse *= 0.88;

  if (isPlaying) _ringRotation += 0.0018 + bassEnergy * 0.000015;
  _idlePhase += 0.025;
  _vizCtx.clearRect(0, 0, W, H);

  if (cover) {
    const sc = 1 + _beatPulse * 0.06;
    cover.style.transform = `scale(${sc})`;
    cover.style.transition = _beatPulse > 0.05 ? 'none' : 'transform 0.3s ease';
  }

  if (_vizMode !== 'galaxy') {
    const glowAlpha = isPlaying ? Math.min(0.55, (bassEnergy / 255) * 0.7 + _beatPulse * 0.35) : VIZ_IDLE_ALPHA * 0.4;
    const glowR     = innerR * (1.0 + _beatPulse * 0.04);
    const grd = _vizCtx.createRadialGradient(cx, cy, glowR * 0.85, cx, cy, glowR * 1.18);
    grd.addColorStop(0, vizHexToRgba(accentRaw, glowAlpha));
    grd.addColorStop(1, vizHexToRgba(accentRaw, 0));
    _vizCtx.beginPath();
    _vizCtx.arc(cx, cy, glowR * 1.18, 0, Math.PI * 2);
    _vizCtx.fillStyle = grd;
    _vizCtx.fill();
  }

  if (_vizMode === 'circular') {
    vizDrawCircular(cx, cy, innerR, maxH, binStep, dataArr, accentRaw, accentRGB, hiRGB);
  } else if (_vizMode === 'wave') {
    vizDrawWave(cx, cy, W, H, waveArr, accentRaw, accentRGB, hiRGB);
  } else if (_vizMode === 'mirror') {
    vizDrawMirror(cx, cy, W, H, binStep, dataArr, accentRaw, accentRGB, hiRGB);
  } else if (_vizMode === 'galaxy') {
    vizDrawGalaxy(cx, cy, W, H, innerR, binStep, dataArr, accentRaw, accentRGB);
  }

  if (_vizMode === 'circular' || _vizMode === 'galaxy') {
    for (let i = _particles.length - 1; i >= 0; i--) {
      const p = _particles[i];
      p.x  += p.vx; p.y  += p.vy;
      p.vx *= 0.93; p.vy *= 0.93;
      p.life -= 0.032;
      if (p.life <= 0) { _particles.splice(i, 1); continue; }
      _vizCtx.beginPath();
      _vizCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      _vizCtx.fillStyle = vizHexToRgba(accentRaw, p.life * 0.9);
      _vizCtx.fill();
    }
  }
  _vizRaf = requestAnimationFrame(vizDraw);
}

function vizDrawCircular(cx, cy, innerR, maxH, binStep, dataArr, accentRaw, accentRGB, hiRGB) {
  const barHalfAngle = (VIZ_BAR_DEG / 2) * (Math.PI / 180);
  const baseAlpha    = isPlaying ? 0.88 : VIZ_IDLE_ALPHA;
  for (let i = 0; i < VIZ_BARS; i++) {
    let sum = 0;
    for (let b = 0; b < binStep; b++) sum += (dataArr[i * binStep + b] || 0);
    const norm   = sum / (binStep * 255);
    const freqT  = i / VIZ_BARS;
    const idleHeight = maxH * VIZ_IDLE_ALPHA * (0.5 + 0.5 * Math.sin(_idlePhase + freqT * Math.PI * 4));
    const height = isPlaying ? Math.max(2, norm * maxH) : idleHeight;
    const angle  = (i / VIZ_BARS) * Math.PI * 2 - Math.PI / 2 + _ringRotation;
    if (isPlaying) {
      _peakHeights[i] = height > _peakHeights[i] ? height : _peakHeights[i] * VIZ_PEAK_DECAY;
    } else {
      _peakHeights[i] *= 0.96;
    }
    const peak = _peakHeights[i];
    if (_isBeat && norm > 0.68 && isPlaying && Math.random() < 0.28) {
      const tipDist = innerR + height;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      for (let p = 0; p < 3; p++) {
        const speed = 0.6 + Math.random() * 1.2;
        const spread = (Math.random() - 0.5) * 0.6;
        _particles.push({
          x: cx + cos * tipDist, y: cy + sin * tipDist,
          vx: cos * speed + Math.cos(angle + Math.PI/2) * spread,
          vy: sin * speed + Math.sin(angle + Math.PI/2) * spread,
          life: 1.0, size: 1.2 + Math.random() * 2.2,
        });
      }
    }
    _vizCtx.save();
    _vizCtx.translate(cx, cy);
    _vizCtx.rotate(angle);
    const x1 = -Math.tan(barHalfAngle) * innerR, x2 = Math.tan(barHalfAngle) * innerR;
    const tipW = 1.4, ty = -(innerR + height);
    _vizCtx.beginPath();
    _vizCtx.moveTo(x1, -innerR);
    _vizCtx.lineTo(x2, -innerR);
    _vizCtx.lineTo(x2 * tipW, ty);
    _vizCtx.quadraticCurveTo(0, ty - Math.abs(x2 * tipW - x1 * tipW) * 0.5, x1 * tipW, ty);
    _vizCtx.closePath();
    const grad = _vizCtx.createLinearGradient(0, -innerR, 0, -(innerR + height));
    grad.addColorStop(0, vizLerpColor(accentRGB, hiRGB, freqT, baseAlpha));
    grad.addColorStop(0.6, vizLerpColor(accentRGB, hiRGB, freqT, isPlaying ? 0.42 : VIZ_IDLE_ALPHA * 0.5));
    grad.addColorStop(1, vizLerpColor(accentRGB, hiRGB, freqT, 0));
    _vizCtx.fillStyle = grad;
    _vizCtx.fill();
    if (isPlaying && peak > 3) {
      _vizCtx.fillStyle = vizLerpColor(accentRGB, hiRGB, freqT, 0.85);
      _vizCtx.beginPath();
      _vizCtx.arc(0, -(innerR + peak), Math.tan(barHalfAngle) * innerR * tipW * 0.9, 0, Math.PI * 2);
      _vizCtx.fill();
    }
    _vizCtx.restore();
  }
}

function vizDrawWave(cx, cy, W, H, waveArr, accentRaw, accentRGB, hiRGB) {
  const h = H * 0.22, y0 = cy, step = W / waveArr.length;
  _vizCtx.save();
  _vizCtx.lineWidth = 2.2;
  _vizCtx.strokeStyle = accentRaw;
  _vizCtx.shadowBlur = 10;
  _vizCtx.shadowColor = accentRaw;
  _vizCtx.beginPath();
  for (let i = 0; i < waveArr.length; i++) {
    const v = (waveArr[i] / 128.0) - 1.0, x = i * step, y = y0 + v * h;
    if (i === 0) _vizCtx.moveTo(x, y); else _vizCtx.lineTo(x, y);
  }
  _vizCtx.stroke();
  _vizCtx.globalAlpha = 0.25;
  _vizCtx.beginPath();
  for (let i = 0; i < waveArr.length; i++) {
    const v = (waveArr[i] / 128.0) - 1.0, x = i * step, y = y0 + v * h * 0.6 + h * 0.4 * Math.sin((i / waveArr.length) * Math.PI * 2 + _idlePhase);
    if (i === 0) _vizCtx.moveTo(x, y); else _vizCtx.lineTo(x, y);
  }
  _vizCtx.stroke();
  _vizCtx.globalAlpha = 1;
  _vizCtx.restore();
  if (!isPlaying) {
    const breathR = Math.min(W, H) * 0.15 + Math.sin(_idlePhase) * Math.min(W, H) * 0.015;
    const grd = _vizCtx.createRadialGradient(cx, cy, breathR * 0.7, cx, cy, breathR);
    grd.addColorStop(0, vizHexToRgba(accentRaw, 0.18));
    grd.addColorStop(1, vizHexToRgba(accentRaw, 0));
    _vizCtx.beginPath();
    _vizCtx.arc(cx, cy, breathR, 0, Math.PI * 2);
    _vizCtx.fillStyle = grd;
    _vizCtx.fill();
  }
}

function vizDrawMirror(cx, cy, W, H, binStep, dataArr, accentRaw, accentRGB, hiRGB) {
  const MBARS = 80, barW = W / MBARS, maxH = H * 0.38, gap = barW * 0.25, baseAlpha = isPlaying ? 0.88 : VIZ_IDLE_ALPHA;
  for (let i = 0; i < MBARS; i++) {
    let sum = 0;
    for (let b = 0; b < binStep; b++) sum += (dataArr[i * binStep + b] || 0);
    const norm = sum / (binStep * 255), freqT = i / MBARS, idleH = maxH * VIZ_IDLE_ALPHA * (0.4 + 0.6 * Math.abs(Math.sin(_idlePhase + freqT * Math.PI * 3)));
    const barH = isPlaying ? Math.max(2, norm * maxH) : idleH, x = i * barW + gap / 2, w = barW - gap;
    const grad1 = _vizCtx.createLinearGradient(0, cy, 0, cy - barH);
    grad1.addColorStop(0, vizLerpColor(accentRGB, hiRGB, freqT, baseAlpha));
    grad1.addColorStop(1, vizLerpColor(accentRGB, hiRGB, freqT, 0));
    _vizCtx.fillStyle = grad1;
    _vizCtx.beginPath();
    _vizCtx.roundRect(x, cy - barH, w, barH, [3, 3, 0, 0]);
    _vizCtx.fill();
    const grad2 = _vizCtx.createLinearGradient(0, cy, 0, cy + barH);
    grad2.addColorStop(0, vizLerpColor(accentRGB, hiRGB, freqT, baseAlpha * 0.65));
    grad2.addColorStop(1, vizLerpColor(accentRGB, hiRGB, freqT, 0));
    _vizCtx.fillStyle = grad2;
    _vizCtx.beginPath();
    _vizCtx.roundRect(x, cy, w, barH, [0, 0, 3, 3]);
    _vizCtx.fill();
    if (isPlaying && norm > 0.08) {
      _vizCtx.fillStyle = vizLerpColor(accentRGB, hiRGB, freqT, 0.9);
      _vizCtx.fillRect(x, cy - barH - 3, w, 2);
    }
  }
}

function vizDrawGalaxy(cx, cy, W, H, innerR, binStep, dataArr, accentRaw, accentRGB) {
  const size = Math.min(W, H);
  let energy = 0;
  for (let b = 0; b < dataArr.length * 0.5; b++) energy += dataArr[b];
  energy /= (dataArr.length * 0.5 * 255);
  for (let i = 0; i < _stars.length; i++) {
    const s = _stars[i]; s.angle += s.speed * (isPlaying ? (1 + energy * 3) : 0.2);
    const dist = size * 0.5 * s.dist, x = cx + Math.cos(s.angle) * dist, y = cy + Math.sin(s.angle) * dist;
    const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle + _idlePhase)); s.twinkle += 0.04;
    _vizCtx.beginPath();
    _vizCtx.arc(x, y, s.size * (isPlaying ? (1 + energy * 1.5) : 1), 0, Math.PI * 2);
    _vizCtx.fillStyle = vizHexToRgba(accentRaw, Math.min(1, isPlaying ? twinkle * (0.3 + energy * 0.9) : twinkle * 0.25));
    _vizCtx.fill();
  }
  if (isPlaying) {
    for (let i = 0; i < VIZ_BARS; i++) {
      let sum = 0; for (let b = 0; b < binStep; b++) sum += (dataArr[i * binStep + b] || 0);
      const norm = sum / (binStep * 255); if (norm < 0.05) continue;
      const angle = (i / VIZ_BARS) * Math.PI * 2 + _ringRotation, len = innerR * 0.5 + norm * size * 0.32;
      _vizCtx.beginPath(); _vizCtx.moveTo(cx, cy); _vizCtx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
      _vizCtx.strokeStyle = vizLerpColor(accentRGB, [Math.max(0,255-accentRGB[0]), accentRGB[2], accentRGB[1]], i / VIZ_BARS, norm * 0.7);
      _vizCtx.lineWidth = 1.2; _vizCtx.stroke();
    }
  }
}

function nextTrack() {
  if (!tracks.length) return;
  let next;
  if (isShuffle) {
    do { next = Math.floor(Math.random() * tracks.length); } while (tracks.length > 1 && next === currentTrack);
  } else {
    next = (currentTrack + 1) % tracks.length;
  }
  loadTrack(next, isPlaying);
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  loadTrack((currentTrack - 1 + tracks.length) % tracks.length, isPlaying);
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  LS.set('music_shuffle', isShuffle);
  updateShuffleBtn();
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  audio.loop = isRepeat;
  LS.set('music_repeat', isRepeat);
  updateRepeatBtn();
}

function updateShuffleBtn() { document.getElementById('shuffleBtn').classList.toggle('active', isShuffle); }
function updateRepeatBtn() { document.getElementById('repeatBtn').classList.toggle('active', isRepeat); }

function renderPlaylist() { filterPlaylist(document.getElementById('playlistSearch')?.value || ''); }

function filterPlaylist(query) {
  const pl = document.getElementById('playlist');
  if (!tracks.length) { pl.innerHTML = '<div class="no-tracks-msg">No tracks yet</div>'; return; }
  const q = query.trim().toLowerCase();
  const filtered = tracks.map((t, i) => ({ t, i })).filter(({ t }) => !q || (t.title||'').toLowerCase().includes(q) || (t.artist||'').toLowerCase().includes(q));
  pl.innerHTML = filtered.map(({ t, i }) => `
    <div class="playlist-item ${i === currentTrack ? 'playing' : ''}" onclick="loadTrack(${i}, true)">
      <div class="pl-num ${i === currentTrack ? 'playing-dot' : ''}">${i === currentTrack ? '' : i+1}</div>
      <div class="pl-info">
        <div class="pl-title">${highlight(escHtml(t.title || 'Untitled'), q)}</div>
        <div class="pl-artist">${highlight(escHtml(t.artist || '—'), q)}</div>
      </div>
    </div>`).join('');
}

function highlight(text, query) {
  if (!query) return text;
  return text.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark style="background:var(--accent-soft);color:var(--accent);border-radius:2px;padding:0 1px">$1</mark>');
}

const seekBar = document.getElementById('seekBar');
let seeking = false;
seekBar.addEventListener('mousedown', () => seeking = true);
seekBar.addEventListener('change', () => {
  if (audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration;
  seeking = false;
});

audio.addEventListener('timeupdate', () => {
  if (seeking || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  seekBar.value = pct;
  seekBar.style.background = `linear-gradient(to right, var(--accent) ${pct}%, var(--surface2) ${pct}%)`;
  document.getElementById('seekCurrent').textContent = fmtAudioTime(audio.currentTime);
  document.getElementById('seekTotal').textContent = fmtAudioTime(audio.duration);
});

audio.addEventListener('ended', () => { if (!isRepeat) nextTrack(); else audio.play(); });
audio.addEventListener('play', () => { isPlaying = true; updatePlayBtn(); });
audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtn(); });

document.getElementById('volBar').addEventListener('input', function() {
  audio.volume = this.value / 100;
  LS.set('music_vol', parseInt(this.value));
  this.style.background = `linear-gradient(to right, var(--accent) ${this.value}%, var(--surface2) ${this.value}%)`;
});

function fmtAudioTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + pad(sec);
}

initMusic();
setTimeout(vizMountCanvas, 80);
window.addEventListener('resize', () => { if (document.getElementById('panel-music').classList.contains('active')) vizMountCanvas(); });

/* Reminder Service */
let reminders = LS.get('reminders') || [];

if (!LS.get('rem_init') && window.MYDATA?.DEFAULT_REMINDERS) {
  reminders = window.MYDATA.DEFAULT_REMINDERS.map((r,i) => ({
    id: Date.now()+i, text: r.text, time: r.time, fired: false
  }));
  LS.set('reminders', reminders);
  LS.set('rem_init', true);
}

function saveReminders() { LS.set('reminders', reminders); }

function addReminder() {
  const text = document.getElementById('remText').value.trim();
  const time = document.getElementById('remTime').value;
  if (!text || !time) { showNotif('Enter details!'); return; }
  reminders.push({ id: Date.now(), text, time, fired: false });
  saveReminders(); renderReminders();
  document.getElementById('remText').value = '';
  document.getElementById('remTime').value = '';
}

function deleteReminder(id) {
  reminders = reminders.filter(r => r.id !== id);
  saveReminders(); renderReminders();
}

function renderReminders() {
  const list = document.getElementById('remList'), sorted = [...reminders].sort((a,b) => a.time.localeCompare(b.time));
  const badge = document.getElementById('remBadge'), upcoming = reminders.filter(r => !r.fired).length;
  badge.style.display = upcoming ? '' : 'none';
  badge.textContent = upcoming;
  if (!sorted.length) { list.innerHTML = '<div class="empty"><p>No reminders</p></div>'; return; }
  list.innerHTML = sorted.map(r => `
    <li class="rem-item ${r.fired ? 'fired' : ''}">
      <span class="rem-time">${r.time}</span>
      <span class="rem-text">${escHtml(r.text)}</span>
      <button class="rem-del" onclick="deleteReminder(${r.id})">×</button>
    </li>`).join('');
}

function checkReminders() {
  const now = new Date(), hhmm = pad(now.getHours()) + ':' + pad(now.getMinutes());
  reminders.forEach(r => {
    if (!r.fired && r.time === hhmm) {
      r.fired = true; showNotif(r.text);
      if (Notification.permission === 'granted') new Notification('Focus', { body: r.text });
    }
  });
  saveReminders(); renderReminders();
}

function reqNotifPerm() {
  if ('Notification' in window) Notification.requestPermission().then(p => showNotif(p === 'granted' ? 'Enabled!' : 'Denied'));
}

setInterval(checkReminders, 15000);
renderReminders();

/* Toast Notifications */
let notifTimeout;
function showNotif(msg) {
  const b = document.getElementById('notifBanner');
  document.getElementById('notifText').textContent = msg;
  b.classList.add('show');
  clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => b.classList.remove('show'), 3500);
}

/* App State Management */
function checkDailyReset() {
  const today = new Date().toDateString(), last = LS.get('last_day');
  if (last !== today) {
    reminders.forEach(r => r.fired = false);
    saveReminders(); LS.set('last_day', today); updateDate();
  }
}
checkDailyReset();
setInterval(checkDailyReset, 60000);
</script>
