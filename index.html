<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus — Daily Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="mydata.js" onerror="window.MYDATA=null"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #6C63FF;
    --accent-soft: rgba(108,99,255,0.10);
    --accent-mid: rgba(108,99,255,0.22);
    --bg: #F7F6FB;
    --surface: #FFFFFF;
    --surface2: #F0EFF8;
    --border: rgba(0,0,0,0.07);
    --border-strong: rgba(0,0,0,0.13);
    --text: #1A1830;
    --text2: #5C5880;
    --text3: #9A97B8;
    --success: #22C98A;
    --danger: #FF5E5E;
    --warn: #FFB74D;
    --radius: 18px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(108,99,255,0.08);
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F0E1A;
      --surface: #1A1830;
      --surface2: #221F38;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text: #EBE9FF;
      --text2: #9E9AC4;
      --text3: #5C5880;
      --accent-soft: rgba(108,99,255,0.18);
      --accent-mid: rgba(108,99,255,0.32);
      --shadow: 0 4px 32px rgba(0,0,0,0.35);
    }
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 196px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 22px 10px 22px;
    gap: 3px;
    z-index: 20;
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 8px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: white; }
  .logo-name {
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.5px; color: var(--text);
    white-space: nowrap;
  }
  .logo-name span { color: var(--accent); }
  .sidebar-date {
    font-size: 11px; color: var(--text3);
    padding: 0 8px; margin-bottom: 8px; line-height: 1.4;
  }
  .sidebar-spacer { flex: 1; }

  .tab {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px; font-weight: 500;
    color: var(--text2);
    transition: var(--transition);
    width: 100%; text-align: left;
    white-space: nowrap;
  }
  .tab svg { width: 17px; height: 17px; flex-shrink: 0; }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active {
    background: var(--accent); color: white;
    box-shadow: 0 2px 14px rgba(108,99,255,0.28);
  }
  .tab .badge {
    min-width: 18px; height: 18px;
    background: rgba(255,255,255,0.28);
    border-radius: 9px; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px; margin-left: auto;
  }
  .tab:not(.active) .badge { background: var(--accent-soft); color: var(--accent); }

  /* ── CONTENT AREA ── */
  .content {
    flex: 1; min-width: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 28px 28px 40px;
    background: var(--bg);
  }
  .content.music-active {
    padding: 0; overflow: hidden;
  }

  .panel { display: none; animation: fadeIn 0.22s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

  /* ══ MUSIC STAGE ══ */
  #panel-music {
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  #panel-music.active { display: flex; flex-direction: column; }

  .music-stage-bg {
    position: absolute; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, var(--accent-soft) 0%, transparent 70%);
    transition: background 0.8s ease;
    pointer-events: none;
  }

  .music-stage-canvas-host {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
  }

  .music-stage-center {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 62%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
    gap: 18px;
  }

  .music-cover-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .music-cover {
    width: 160px; height: 160px;
    border-radius: 20px;
    background: var(--accent-soft);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.30), 0 0 0 1px var(--border);
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
    transform-origin: center center;
    will-change: transform;
  }
  .music-cover img { width: 100%; height: 100%; object-fit: cover; }
  .cover-placeholder { font-size: 58px; }

  .music-info { text-align: center; pointer-events: none; }
  .music-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; text-shadow: 0 1px 12px rgba(0,0,0,0.12); }
  .music-artist { font-size: 13px; color: var(--text3); }
  .music-no-src { font-size: 12px; color: var(--warn); margin-top: 4px; }

  /* 4D BADGES UI */
  .music-badges { 
    display: flex; gap: 6px; justify-content: center; 
    margin-top: 10px; flex-wrap: wrap; pointer-events: none; 
  }
  .badge-tag { 
    font-family: 'DM Mono', monospace; font-size: 9px; 
    letter-spacing: 1px; text-transform: uppercase; 
    padding: 4px 10px; border-radius: 12px; 
    background: var(--surface2); border: 1px solid var(--border); color: var(--text3); 
  }
  .badge-tag.highlight { 
    color: var(--accent); border-color: var(--accent-mid); 
    background: var(--accent-soft); font-weight: 600; 
  }

  /* MOOD INPUT */
  .music-mood-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; pointer-events: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 6px 6px 10px; border-radius: 30px;
    transition: var(--transition);
  }
  .music-mood-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  
  .mood-mode-select {
    background: transparent; border: none; outline: none;
    color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px;
    cursor: pointer; padding-right: 6px; border-right: 1px solid var(--border);
  }
  .mood-mode-select option { background: var(--surface); color: var(--text); }
  
  .mood-input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    width: 190px; margin-left: 4px;
  }
  .mood-input::placeholder { color: var(--text3); }
  .mood-btn {
    background: var(--accent); color: white; border: none; border-radius: 50%;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: var(--transition); font-size: 12px;
  }
  .mood-btn:hover { filter: brightness(1.1); transform: scale(1.05); }

  /* ML FEEDBACK UI */
  .ml-feedback-wrap {
    display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 12px;
    font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); pointer-events: auto;
    background: var(--surface2); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  .ml-btn { 
    background: transparent; border: 1px solid var(--border-strong); 
    border-radius: 8px; cursor: pointer; padding: 4px 8px; 
    font-size: 12px; transition: var(--transition); color: var(--text2); 
  }
  .ml-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

  /* MUSIC DOCK */
  .music-dock {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
    padding: 20px 32px 28px;
    background: linear-gradient(to top, var(--surface) 60%, transparent 100%);
    display: flex; flex-direction: column; gap: 12px;
  }
  .music-seek-wrap { margin-bottom: 2px; }
  .music-seek {
    width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
    border-radius: 2px; outline: none; cursor: pointer; margin-bottom: 4px;
    background: linear-gradient(to right, var(--accent) 0%, var(--surface2) 0%);
  }
  .music-seek::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .seek-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  
  .music-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .mc-btn {
    border: none; background: transparent; cursor: pointer; color: var(--text2); width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: var(--transition); font-size: 20px;
  }
  .mc-btn:hover { background: var(--surface2); color: var(--text); }
  .mc-btn-main { width: 54px; height: 54px; background: var(--accent); color: white; box-shadow: 0 3px 16px rgba(108,99,255,0.30); font-size: 22px; }
  .mc-btn-main:hover { filter: brightness(1.1); transform: scale(1.04); }
  .mc-btn.active { color: var(--accent); }

  .dock-bottom-row { display: flex; align-items: center; gap: 12px; }
  .volume-row { display: flex; align-items: center; gap: 8px; flex: 1; }
  .vol-icon { font-size: 15px; color: var(--text3); }
  .music-vol {
    flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
    border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(to right, var(--accent) 70%, var(--surface2) 70%);
  }
  .music-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent); cursor: pointer; }

  .viz-mode-row { display: flex; gap: 5px; }
  .viz-mode-btn {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-strong); background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--text2); cursor: pointer; transition: var(--transition);
  }
  .viz-mode-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .viz-mode-btn:hover:not(.active) { background: var(--surface2); }

  .music-playlist-toggle {
    width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: var(--transition); flex-shrink: 0;
  }
  .music-playlist-toggle:hover { background: var(--surface); color: var(--text); }
  .music-playlist-toggle.open { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  /* PLAYLIST DRAWER */
  .playlist-drawer {
    position: absolute; left: 0; right: 0; bottom: 0; max-height: 50vh; overflow-y: auto; background: var(--surface);
    border-top: 1px solid var(--border); transform: translateY(100%); opacity: 0; transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.25s ease; z-index: 6; pointer-events: none; will-change: transform;
  }
  .playlist-drawer.open { transform: translateY(0%); opacity: 1; pointer-events: auto; }
  .playlist-drawer::-webkit-scrollbar { width: 4px; }
  .playlist-drawer::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .playlist-drawer-header {
    position: sticky; top: 0; padding: 12px 16px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; z-index: 1;
  }
  .playlist-drawer-header-top { display: flex; justify-content: space-between; align-items: center; }
  .playlist-search {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 32px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: var(--transition);
  }
  .playlist-search::placeholder { color: var(--text3); }
  .playlist-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .playlist-search-wrap { position: relative; }
  .playlist-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 13px; }
  
  .playlist-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: var(--transition);
  }
  .playlist-item:last-child { border-bottom: none; }
  .playlist-item:hover { background: var(--accent-soft); }
  .playlist-item.playing { background: var(--accent-soft); }
  .pl-num { width: 22px; font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; text-align: center; }
  .pl-num.playing-dot::after { content: '▶'; font-size: 10px; color: var(--accent); }
  .pl-info { flex: 1; min-width: 0; }
  .pl-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-artist { font-size: 11px; color: var(--text3); }

  /* CARDS & TASKS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
  .card + .card { margin-top: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  
  .task-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .task-input-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: var(--transition);
  }
  .task-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .btn {
    background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 11px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: var(--transition); white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--danger); }
  
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .filter-btn { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; }
  .filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid transparent; transition: var(--transition); animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: none; } }
  .task-item:hover { border-color: var(--border-strong); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
  .task-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border-strong); background: transparent; cursor: pointer; transition: var(--transition); flex-shrink: 0; display: flex; align-items: center; justify-content: center; appearance: none; }
  .task-check:checked { background: var(--success); border-color: var(--success); }
  .task-check:checked::after { content: ''; width: 5px; height: 9px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px, -1px); display: block; }
  .task-text { flex: 1; font-size: 14px; line-height: 1.4; cursor: pointer; word-break: break-word; }
  .task-text[contenteditable="true"] { outline: none; border-bottom: 1px dashed var(--accent); }
  .task-priority { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
  .p-low { background: var(--text3); } .p-mid { background: var(--warn); } .p-high { background: var(--danger); }
  .task-del { width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .task-del:hover { background: rgba(255,94,94,0.12); color: var(--danger); }
  
  .task-stats { display: flex; gap: 20px; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 10px; }
  .task-stat { font-size: 12px; color: var(--text3); }
  .task-stat span { color: var(--text); font-weight: 600; }
  .progress-wrap { margin-bottom: 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #A78BFA); border-radius: 3px; transition: width 0.5s ease; }

  /* STOPWATCH */
  .sw-time { font-size: 64px; font-weight: 500; letter-spacing: -2px; color: var(--text); line-height: 1; text-align: center; }
  .sw-ms { font-size: 28px; color: var(--text3); vertical-align: super; font-size: 32px; }
  .sw-controls { display: flex; justify-content: center; gap: 14px; margin: 20px 0; }
  .sw-btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
  .sw-btn-main { width: 80px; height: 80px; background: var(--accent); color: white; box-shadow: 0 4px 20px rgba(108,99,255,0.35); font-size: 26px; }
  .sw-btn-sec { background: var(--surface2); color: var(--text); }
  .sw-btn-sec:hover { background: var(--border-strong); }
  .lap-item { display: flex; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 13px; }

  /* REMINDERS */
  .rem-form { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-bottom: 16px; }
  .rem-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px; color: var(--text); outline: none; }
  .rem-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: var(--surface2); border-radius: var(--radius-sm); }
  .rem-time { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); }

  /* NOTIFICATIONS */
  .notif-banner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--accent); color: white; padding: 13px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 32px rgba(108,99,255,0.4); transition: transform 0.4s ease; z-index: 1000; display: flex; align-items: center; gap: 10px; }
  .notif-banner.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><div class="logo-name">Focu<span>s</span></div></div>
    <div class="sidebar-date" id="headerDate"></div>
    <button class="tab active" onclick="switchTab('tasks', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg><span>Tasks</span><div class="badge" id="taskBadge">0</div></button>

<script>
/* ══════════════════════════════════════════════
   STATE & STORAGE
══════════════════════════════════════════════ */
const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem('focus_'+k)); } catch(e){ return null; } },
  set(k,v) { try { localStorage.setItem('focus_'+k, JSON.stringify(v)); } catch(e){} }
};

function updateDate() { 
  const d = new Date(); 
  const el = document.getElementById('headerDate'); 
  if (el) el.textContent = d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'}); 
}
updateDate();

function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  
  const content = document.getElementById('mainContent');
  if (name === 'music') { 
    content.classList.add('music-active'); 
    requestAnimationFrame(vizMountCanvas); 
  } else { 
    content.classList.remove('music-active'); 
  }
}

/* ══════════════════════════════════════════════
   TASKS
══════════════════════════════════════════════ */
let tasks = LS.get('tasks') || []; 
let taskFilter = 'all';

function saveTasks() { 
  LS.set('tasks', tasks); 
}

function addTask() { 
  const inp = document.getElementById('taskInput'); 
  const text = inp.value.trim(); 
  if (!text) return; 
  tasks.unshift({ id: Date.now(), text, done: false, priority: 'mid' }); 
  saveTasks(); 
  renderTasks(); 
  inp.value = ''; 
}

function toggleTask(id) { 
  const t = tasks.find(t => t.id === id); 
  if (t) t.done = !t.done; 
  saveTasks(); 
  renderTasks(); 
}

function deleteTask(id) { 
  tasks = tasks.filter(t => t.id !== id); 
  saveTasks(); 
  renderTasks(); 
}

function cycleTask(id) { 
  const t = tasks.find(t => t.id === id); 
  if(!t) return; 
  const c = {low:'mid', mid:'high', high:'low'}; 
  t.priority = c[t.priority]; 
  saveTasks(); 
  renderTasks(); 
}

function setFilter(f, btn) { 
  taskFilter = f; 
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); 
  btn.classList.add('active'); 
  renderTasks(); 
}

function clearDone() { 
  tasks = tasks.filter(t => !t.done); 
  saveTasks(); 
  renderTasks(); 
}

function startEdit(el, id) { 
  el.contentEditable = true; 
  el.focus(); 
  el.onblur = () => { 
    el.contentEditable = false; 
    const t = tasks.find(t => t.id === id); 
    if(t) t.text = el.textContent.trim() || t.text; 
    saveTasks(); 
    renderTasks(); 
  }; 
  el.onkeydown = e => { 
    if(e.key === 'Enter') { e.preventDefault(); el.blur(); } 
  } 
}

function escHtml(s) { 
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

function renderTasks() {
  const list = document.getElementById('taskList');
  let f = tasks; 
  
  if(taskFilter === 'active') f = tasks.filter(t => !t.done); 
  else if(taskFilter === 'done') f = tasks.filter(t => t.done); 
  else if(taskFilter === 'high') f = tasks.filter(t => t.priority === 'high' && !t.done);
  
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  
  document.getElementById('progressFill').style.width = (total ? Math.round(done/total*100) : 0) + '%'; 
  document.getElementById('progressText').textContent = done + ' / ' + total; 
  document.getElementById('taskBadge').textContent = tasks.filter(t => !t.done).length;
  
  if(!f.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><p>No tasks here.</p></div>`;
  } else {
    list.innerHTML = f.map(t => `
      <li class="task-item ${t.done ? 'done' : ''}">
        <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
        <div class="task-priority p-${t.priority}" onclick="cycleTask(${t.id})"></div>
        <div class="task-text" onclick="startEdit(this,${t.id})">${escHtml(t.text)}</div>
        <button class="task-del" onclick="deleteTask(${t.id})">×</button>
      </li>
    `).join('');
  }
}
renderTasks();

/* ══════════════════════════════════════════════
   STOPWATCH & 4D AUTO-DJ
══════════════════════════════════════════════ */
let swRunning = false, swElapsed = 0, swStart = 0, swInterval = null; 
let laps = [];

// ── FIXED: 4D ENGINE UPGRADE FOR STOPWATCH ──
function triggerAdaptiveMusic() {
  if (!tracks || tracks.length === 0) return;

  const activeTasks = tasks.filter(t => !t.done);
  if (activeTasks.length === 0) return; 

  let cognitiveLoad = 0.5; // Baseline
  const hasHighPriority = activeTasks.some(t => t.priority === 'high');
  const hour = new Date().getHours();
  const isGrindHours = (hour >= 0 && hour <= 5);

  if (hasHighPriority) cognitiveLoad += 0.3;
  if (isGrindHours) cognitiveLoad += 0.2;

  // 1. Convert load to 4D Acoustic Targets
  const targetBPM = cognitiveLoad > 0.7 ? 135 : 85;
  const targetEnergy = cognitiveLoad > 0.7 ? 'high' : 'low';
  const targetTone = cognitiveLoad > 0.7 ? 'bright' : 'muffled';
  const targetRhythm = cognitiveLoad > 0.7 ? 'punchy' : 'smooth';

  let bestMatch = null;
  let lowestPenalty = Infinity;

  // 2. Numerical mapping for textual data
  const eScores = { 'low': 0, 'medium': 50, 'high': 100 };
  const tScores = { 'muffled': 0, 'balanced': 50, 'bright': 100 };
  const rScores = { 'smooth': 0, 'bouncy': 50, 'punchy': 100 };

  tracks.forEach((t, index) => {
    const trackBPM = t.bpm || 110;
    const trackEnergy = t.energy || 'medium';
    const trackTone = t.tone || 'balanced';
    const trackRhythm = t.rhythm || 'bouncy';
    
    let penalty = 0;

    penalty += Math.abs(targetBPM - trackBPM) * 1.0;
    penalty += Math.abs(eScores[targetEnergy] - (eScores[trackEnergy] || 50)) * 0.4;
    penalty += Math.abs(tScores[targetTone] - (tScores[trackTone] || 50)) * 0.25;
    penalty += Math.abs(rScores[targetRhythm] - (rScores[trackRhythm] || 50)) * 0.25;
    penalty += Math.random() * 5; 

    if (penalty < lowestPenalty) {
      lowestPenalty = penalty;
      bestMatch = { t, index };
    }
  });

  if (bestMatch && bestMatch.index !== currentTrack) {
    if (cognitiveLoad > 0.7) {
      showNotif(`Deep Work Engaged: ${bestMatch.t.bpm || 110} BPM track queued.`);
    } else {
      showNotif(`Flow State Engaged: Ambient track queued.`);
    }
    loadTrack(bestMatch.index, true); 
    isShuffle = true; 
    updateShuffleBtn();
  }
}

function toggleSW() {
  if (swRunning) {
    clearInterval(swInterval); 
    swElapsed += Date.now() - swStart; 
    swRunning = false;
    document.getElementById('swPlayBtn').textContent = '▶'; 
    document.getElementById('swLabel').textContent = 'Paused';
    
    const activeTasks = tasks.filter(t => !t.done).map(t => t.text);
    if (swElapsed > 60000) {
      fetch('https://focus-companion.onrender.com/log_session', { 
        method: 'POST', 
        headers: {'Content-Type':'application/json'}, 
        body: JSON.stringify({duration_minutes: parseFloat((swElapsed/60000).toFixed(2)), tasks_in_progress: activeTasks})
      }).catch(e=>{});
      
      showNotif("Mannak AI analyzing session...");
      
      fetch('https://focus-companion.onrender.com/critique', { 
        method: 'POST', 
        headers: {'Content-Type':'application/json'}, 
        body: JSON.stringify({duration_minutes: parseFloat((swElapsed/60000).toFixed(2)), tasks_in_progress: activeTasks})
      })
      .then(r=>r.json())
      .then(d=>{ 
        const b = document.getElementById('notifBanner'); 
        document.getElementById('notifText').textContent = d.critique; 
        b.classList.add('show'); 
        setTimeout(() => b.classList.remove('show'), 8000); 
      }).catch(e=>{});
    }
  } else {
    swStart = Date.now(); 
    swRunning = true;
    document.getElementById('swPlayBtn').textContent = '⏸'; 
    document.getElementById('swLabel').textContent = 'Running'; 
    swInterval = setInterval(tickSW, 31);
    
    // Trigger Auto-DJ if not already playing
    if (!isPlaying) {
      triggerAdaptiveMusic();
    }
  }
}

function tickSW() { 
  const t = swElapsed + (Date.now() - swStart); 
  document.getElementById('swH').textContent = pad(Math.floor(t/3600000)); 
  document.getElementById('swM').textContent = pad(Math.floor(t/60000)%60); 
  document.getElementById('swS').textContent = pad(Math.floor(t/1000)%60); 
  document.getElementById('swMs').textContent = pad(Math.floor((t%1000)/10)); 
}

function resetSW() { 
  clearInterval(swInterval); 
  swRunning = false; 
  swElapsed = 0; 
  swStart = 0; 
  laps = []; 
  ['swH','swM','swS','swMs'].forEach(id => document.getElementById(id).textContent = '00'); 
  document.getElementById('swPlayBtn').textContent = '▶'; 
  document.getElementById('swLabel').textContent = 'Ready'; 
  document.getElementById('lapsWrap').style.display = 'none'; 
}

function lapSW() { 
  if(!swRunning) return; 
  const t = swElapsed + (Date.now() - swStart);
  const lt = t - (laps.length ? laps.reduce((a,l) => a + l.raw, 0) : 0); 
  laps.push({num: laps.length + 1, total: t, lapTime: lt, raw: lt}); 
  document.getElementById('lapsWrap').style.display = 'block'; 
  document.getElementById('lapsList').innerHTML = [...laps].reverse().map(l => `
    <div class="lap-item">
      <span>Lap ${l.num}</span>
      <span>${fmtTime(l.total)}</span>
      <span style="color:var(--text3)">+${fmtTime(l.lapTime)}</span>
    </div>
  `).join(''); 
}

function fmtTime(ms) { return pad(Math.floor(ms/60000)%60)+':'+pad(Math.floor(ms/1000)%60)+'.'+pad(Math.floor((ms%1000)/10)); }
function pad(n) { return String(n).padStart(2,'0'); }

/* ══════════════════════════════════════════════
   MUSIC PLAYER & 4D ENGINE
══════════════════════════════════════════════ */
const audio = document.getElementById('audioPlayer');
let tracks = []; 
let currentTrack = 0; 
let isPlaying = false; 
let isShuffle = false; 
let isRepeat = false;

let _currentTone = 'balanced'; 
let _currentRhythm = 'bouncy'; 

let _lastMoodInput = ""; 
let _lastTrackFeatures = null;

function initMusic() {
  if (window.MYDATA?.MUSIC_TRACKS) tracks = window.MYDATA.MUSIC_TRACKS;
  currentTrack = Math.min(LS.get('music_track') || 0, tracks.length - 1);
  isShuffle = LS.get('music_shuffle') || false; 
  isRepeat = LS.get('music_repeat') || false;
  
  audio.volume = (LS.get('music_vol') || 70) / 100; 
  document.getElementById('volBar').value = (LS.get('music_vol') || 70);
  
  if (tracks.length) {
    loadTrack(currentTrack, false); 
  } else {
    document.getElementById('musicTitle').textContent = 'Add tracks in mydata.js';
  }
  renderPlaylist();
}

function loadTrack(idx, forcePlay) {
  currentTrack = idx; 
  LS.set('music_track', idx); 
  const t = tracks[idx];
  
  document.getElementById('musicTitle').textContent = t.title || 'Untitled';
  document.getElementById('musicArtist').textContent = t.artist || '—';
  
  // Update 4D Badges
  const badgesEl = document.getElementById('musicBadges');
  if (t.bpm) {
    badgesEl.innerHTML = `
      <span class="badge-tag highlight">${t.bpm} BPM</span>
      <span class="badge-tag">${(t.energy||'MID').toUpperCase()} ENRGY</span>
      <span class="badge-tag">${(t.tone||'BAL').toUpperCase()}</span>
      <span class="badge-tag">${(t.rhythm||'BNCY').toUpperCase()}</span>
    `;
  } else { 
    badgesEl.innerHTML = ''; 
  }

  // Extract Synergy Vars for the Visualizer
  _currentTone = t.tone || 'balanced';
  _currentRhythm = t.rhythm || 'bouncy';

  const cover = document.getElementById('musicCover');
  if (t.cover) { 
    const img = new Image(); 
    img.crossOrigin = 'anonymous'; 
    img.onload = () => extractAccentFromCover(img); 
    img.src = t.cover; 
    cover.innerHTML = `<img src="${t.cover}">`; 
  } else { 
    cover.innerHTML = '<div class="cover-placeholder">🎵</div>'; 
    applyAccent(window.MYDATA?.SETTINGS?.accentColor || '#6C63FF'); 
  }
  
  if (t.src) { 
    audio.crossOrigin = "anonymous"; 
    audio.src = t.src; 
    audio.load(); 
  } else {
    audio.src = '';
  }
  
  if (forcePlay && t.src) { 
    audio.play().then(() => { 
      isPlaying = true; 
      updatePlayBtn(); 
    }).catch(() => { 
      isPlaying = false; 
      updatePlayBtn(); 
    }); 
  } else { 
    isPlaying = false; 
    updatePlayBtn(); 
  }
  
  renderPlaylist(); 
  requestAnimationFrame(vizMountCanvas);
}

// ── HYBRID NLP MOOD MATCHER (4D ACOUSTIC ENGINE) ──
// ── HYBRID NLP MOOD MATCHER (BULLETPROOF EDITION) ──
// ── HYBRID NLP MOOD MATCHER (ARMOR-PLATED EDITION) ──
async function applyMood() {
  const input = document.getElementById('moodInput');
  const mode = document.getElementById('moodMode').value;
  const text = input.value.trim();
  
  if (!text || !tracks.length) return;

  let targetBPM = 110; 
  let targetEnergy = 'medium'; 
  let targetTone = 'balanced'; 
  let targetRhythm = 'bouncy';

  try {
      if (mode === 'offline') {
        const high = ['hype', 'pumped', 'happy', 'grind', 'fast', 'energy', 'workout', 'crazy', 'mad', 'angry', 'motivated', 'loud'];
        const low = ['chill', 'sad', 'relax', 'calm', 'tired', 'sleep', 'peace', 'slow', 'study', 'focus', 'mellow', 'exhausted'];
        let hScore = 0, lScore = 0; 
        high.forEach(k => { if(text.toLowerCase().includes(k)) hScore++; }); 
        low.forEach(k => { if(text.toLowerCase().includes(k)) lScore++; });
        
        if (hScore > lScore) { 
          targetBPM = 135; targetEnergy = 'high'; targetTone = 'bright'; targetRhythm = 'punchy'; 
        } else if (lScore > hScore) { 
          targetBPM = 85; targetEnergy = 'low'; targetTone = 'muffled'; targetRhythm = 'smooth'; 
        }
      } else {
        showNotif("Mannak AI analyzing 4D targets...");
        console.log("📡 Sending request to Python server...");
        
        const res = await fetch('https://focus-companion.onrender.com/analyze_mood', { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ mood: text }) 
        });

        // If the Python server crashes (500 error), this catches it safely
        if (!res.ok) throw new Error(`Python server failed with status: ${res.status}`);

        const rawData = await res.json();
        console.log("🤖 Raw Gemini Output:", rawData);

        // FORCE ALL JSON KEYS TO LOWERCASE
        // This stops the crash if Gemini replies with {"BPM": 120} instead of {"bpm": 120}
        const data = {};
        for (let key in rawData) {
            data[key.toLowerCase()] = rawData[key];
        }
        
        if (data.bpm) { 
          targetBPM = parseInt(data.bpm); 
          targetEnergy = String(data.energy || 'medium').toLowerCase(); 
          targetTone = String(data.tone || 'balanced').toLowerCase(); 
          targetRhythm = String(data.rhythm || 'bouncy').toLowerCase(); 
        } else { 
          showNotif("AI parsing failed. Check browser console."); 
          console.error("❌ Missing 'bpm' key in normalized data:", data);
          return; 
        }
      }

      console.log("🎯 Final Targeting:", {targetBPM, targetEnergy, targetTone, targetRhythm});

      let bestMatch = null; 
      let lowestPenalty = Infinity;
      const eScores = { 'low': 0, 'medium': 50, 'high': 100 };
      const tScores = { 'muffled': 0, 'balanced': 50, 'bright': 100 };
      const rScores = { 'smooth': 0, 'bouncy': 50, 'punchy': 100 };

      tracks.forEach((t, index) => {
        const trackEnergy = String(t.energy || 'medium').toLowerCase();
        const trackTone = String(t.tone || 'balanced').toLowerCase();
        const trackRhythm = String(t.rhythm || 'bouncy').toLowerCase();
          
        let penalty = Math.abs(targetBPM - (t.bpm || 110)) * 1.0;
        penalty += Math.abs((eScores[targetEnergy] || 50) - (eScores[trackEnergy] || 50)) * 0.4;
        penalty += Math.abs((tScores[targetTone] || 50) - (tScores[trackTone] || 50)) * 0.25;
        penalty += Math.abs((rScores[targetRhythm] || 50) - (rScores[trackRhythm] || 50)) * 0.25;
        penalty += Math.random() * 5; 

        if (penalty < lowestPenalty) { 
          lowestPenalty = penalty; 
          bestMatch = { t, index }; 
        }
      });

      if (bestMatch) {
        showNotif(`Vibe Matched: "${bestMatch.t.title}"`);
        loadTrack(bestMatch.index, true);
        isShuffle = true; 
        updateShuffleBtn();
        
        // Trigger ML Feedback UI
        _lastMoodInput = text;
        _lastTrackFeatures = bestMatch.t.ml_features || null;
        document.getElementById('mlFeedbackWrap').style.display = 'flex';
        console.log("✅ Widget triggered for:", _lastTrackFeatures);

        input.value = ''; 
        input.blur();
      }
      
  } catch (error) {
      // If ANYTHING fails, it prints a massive red error in your console
      console.error("🔥 CRASH IN APPLYMOOD:", error);
      showNotif("JavaScript crash! Check F12 Console.");
  }
}

function nextTrack(force) { 
  if(!tracks.length) return; 
  let n; 
  if(isShuffle) {
    do { n = Math.floor(Math.random() * tracks.length); } while (tracks.length > 1 && n === currentTrack);
  } else {
    n = (currentTrack + 1) % tracks.length;
  } 
  loadTrack(n, force || isPlaying); 
}

function prevTrack() { 
  if(!tracks.length) return; 
  if(audio.currentTime > 3) { audio.currentTime = 0; return; } 
  loadTrack((currentTrack - 1 + tracks.length) % tracks.length, isPlaying); 
}

function togglePlay() { 
  if (isPlaying) {
    audio.pause(); 
    isPlaying = false; 
    updatePlayBtn();
  } else {
    vizInitAudio(); 
    if(_vizActx) _vizActx.resume(); 
    audio.play().then(() => {
      isPlaying = true; 
      vizStart(); 
      updatePlayBtn();
    }).catch(()=>{}); 
  } 
}

function updatePlayBtn() { 
  document.getElementById('playPauseBtn').innerHTML = isPlaying ? '⏸' : '▶'; 
}

function updateShuffleBtn() { 
  const btn = document.getElementById('shuffleBtn');
  if (btn) btn.style.color = isShuffle ? 'var(--accent)' : ''; 
}

function updateRepeatBtn() { 
  const btn = document.getElementById('repeatBtn');
  if (btn) btn.style.color = isRepeat ? 'var(--accent)' : ''; 
}

function toggleShuffle() { 
  isShuffle = !isShuffle; 
  LS.set('music_shuffle', isShuffle); 
  updateShuffleBtn();
}

function toggleRepeat() { 
  isRepeat = !isRepeat; 
  audio.loop = isRepeat; 
  LS.set('music_repeat', isRepeat); 
  updateRepeatBtn();
}

function togglePlaylist() { 
  const d = document.getElementById('playlistDrawer');
  const t = document.getElementById('playlistToggle'); 
  const o = !d.classList.contains('open'); 
  if (o) {
    d.style.bottom = document.getElementById('musicDock').offsetHeight + 'px'; 
  }
  d.classList.toggle('open', o); 
  t.classList.toggle('open', o); 
  if(o) setTimeout(() => document.getElementById('playlistSearch')?.focus(), 50); 
}

let seeking = false; 
const seekBar = document.getElementById('seekBar');

audio.addEventListener('timeupdate', () => { 
  if(seeking || !audio.duration) return; 
  const p = (audio.currentTime / audio.duration) * 100; 
  seekBar.value = p; 
  seekBar.style.background = `linear-gradient(to right, var(--accent) ${p}%, var(--surface2) ${p}%)`; 
  document.getElementById('seekCurrent').textContent = fmtAudioTime(audio.currentTime); 
  document.getElementById('seekTotal').textContent = fmtAudioTime(audio.duration); 
});

audio.addEventListener('ended', () => { 
  if(!isRepeat) nextTrack(true); else audio.play(); 
});

seekBar.addEventListener('mousedown', () => seeking = true); 
seekBar.addEventListener('change', () => { 
  if(audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration; 
  seeking = false; 
});

document.getElementById('volBar').addEventListener('input', function() { 
  audio.volume = this.value / 100; 
  LS.set('music_vol', parseInt(this.value)); 
  this.style.background = `linear-gradient(to right, var(--accent) ${this.value}%, var(--surface2) ${this.value}%)`; 
});

function fmtAudioTime(s) { 
  if(!s || isNaN(s)) return '0:00'; 
  return Math.floor(s/60) + ':' + pad(Math.floor(s%60)); 
}

function renderPlaylist(query = '') {
  const pl = document.getElementById('playlist'); 
  if (!tracks.length) {
    pl.innerHTML = '<div style="padding:20px;text-align:center;">No tracks</div>'; 
    return;
  }
  const q = query.trim().toLowerCase(); 
  const f = tracks.map((t,i) => ({t,i})).filter(({t}) => !q || (t.title || '').toLowerCase().includes(q) || (t.artist || '').toLowerCase().includes(q));
  pl.innerHTML = f.map(({t,i}) => `
    <div class="playlist-item ${i === currentTrack ? 'playing' : ''}" onclick="loadTrack(${i},true)">
      <div class="pl-num ${i === currentTrack ? 'playing-dot' : ''}">${i === currentTrack ? '' : i + 1}</div>
      <div class="pl-info">
        <div class="pl-title">${t.title || 'Untitled'}</div>
        <div class="pl-artist">${t.artist || '—'}</div>
      </div>
    </div>
  `).join('');
}

function filterPlaylist(v) { renderPlaylist(v); }

/* ══════════════════════════════════════════════
   VISUALIZER & SYNERGY
══════════════════════════════════════════════ */
let _vizActx = null, _vizAnalyser = null, _vizSource = null, _vizRaf = null, _vizCanvas = null, _vizCtx = null;
const VIZ_BARS = 128, VIZ_FFT = 2048;
const _peakHeights = new Float32Array(VIZ_BARS);
const _vizSmoothData = new Float32Array(VIZ_BARS);
const _particles = [];
const _beatHistory = new Float32Array(43);
let _beatIdx = 0, _isBeat = false, _beatPulse = 0, _ringRotation = 0, _idlePhase = 0, _vizMode = 'circular', _stars = [];
const _byteDataArr = new Uint8Array(VIZ_BARS * 2), _floatWaveArr = new Float32Array(VIZ_FFT);

function setVizMode(m, btn) { 
  _vizMode = m; 
  document.querySelectorAll('.viz-mode-btn').forEach(b => b.classList.remove('active')); 
  if(btn) btn.classList.add('active'); 
}

function vizHexToRgba(h, a) { 
  h = h.replace('#',''); 
  if(h.length === 3) h = h.split('').map(c => c+c).join(''); 
  return `rgba(${parseInt(h.substring(0,2),16)},${parseInt(h.substring(2,4),16)},${parseInt(h.substring(4,6),16)},${a})`; 
}

function vizHexRGB(h) { 
  h = h.replace('#',''); 
  if(h.length === 3) h = h.split('').map(c => c+c).join(''); 
  return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)]; 
}

function vizLerpColor(c1, c2, t, a) { 
  return `rgba(${Math.round(c1[0]+(c2[0]-c1[0])*t)},${Math.round(c1[1]+(c2[1]-c1[1])*t)},${Math.round(c1[2]+(c2[2]-c1[2])*t)},${a})`; 
}

function extractAccentFromCover(imgEl) {
  try { 
    const sz = 12, oc = document.createElement('canvas'); 
    oc.width = sz; oc.height = sz; 
    const octx = oc.getContext('2d'); 
    octx.drawImage(imgEl,0,0,sz,sz); 
    const d = octx.getImageData(0,0,sz,sz).data; 
    let r = 0, g = 0, b = 0; 
    for(let i=0; i<d.length; i+=4) { r+=d[i]; g+=d[i+1]; b+=d[i+2]; } 
    r = Math.round(r/(d.length/4)); g = Math.round(g/(d.length/4)); b = Math.round(b/(d.length/4)); 
    const avg = (r+g+b)/3; 
    r = Math.min(255, r+(r-avg)*1.7); g = Math.min(255, g+(g-avg)*1.7); b = Math.min(255, b+(b-avg)*1.7); 
    if((r*299+g*587+b*114)/1000 < 60) { r=Math.min(255,r+60); g=Math.min(255,g+60); b=Math.min(255,b+60); } 
    applyAccent('#'+[r,g,b].map(c => Math.round(c).toString(16).padStart(2,'0')).join('')); 
  } catch(e) {}
}

function applyAccent(h) { 
  document.documentElement.style.setProperty('--accent',h); 
  document.documentElement.style.setProperty('--accent-soft',h+'1A'); 
  document.documentElement.style.setProperty('--accent-mid',h+'38'); 
  const v = document.getElementById('volBar'); 
  if(v) v.style.background = `linear-gradient(to right, ${h} ${v.value}%, var(--surface2) ${v.value}%)`; 
}

function vizMountCanvas() {
  if(_vizCanvas && _vizCanvas.parentNode) _vizCanvas.parentNode.removeChild(_vizCanvas);
  const host = document.getElementById('vizHost');
  const p = document.getElementById('panel-music'); 
  if(!host || !p) return;
  
  const W = p.offsetWidth || window.innerWidth - 196;
  const H = p.offsetHeight || window.innerHeight;
  
  _vizCanvas = document.createElement('canvas'); 
  _vizCanvas.width = W; 
  _vizCanvas.height = H; 
  Object.assign(_vizCanvas.style, {position:'absolute', inset:'0', width:'100%', height:'100%', pointerEvents:'none'});
  
  host.innerHTML = ''; 
  host.appendChild(_vizCanvas); 
  _vizCtx = _vizCanvas.getContext('2d');
  
  if(_stars.length === 0) {
    for(let i=0; i<350; i++) {
      _stars.push({x:(Math.random()-0.5)*W*2, y:(Math.random()-0.5)*H*2, z:Math.random()*W, twinkle:Math.random()*Math.PI*2});
    }
  }
  if(!_vizRaf) vizDraw();
}

function vizInitAudio() { 
  if(_vizActx) return; 
  try { 
    audio.crossOrigin="anonymous"; 
    _vizActx = new(window.AudioContext||window.webkitAudioContext)(); 
    _vizAnalyser = _vizActx.createAnalyser(); 
    _vizAnalyser.fftSize = VIZ_FFT; 
    _vizAnalyser.smoothingTimeConstant = 0.85; 
    _vizSource = _vizActx.createMediaElementSource(audio); 
    _vizSource.connect(_vizAnalyser); 
    _vizAnalyser.connect(_vizActx.destination); 
  } catch(e) {} 
}

async function vizStart() { 
  if(_vizActx) try { await _vizActx.resume(); } catch(e) {} 
  if(!_vizCanvas) vizMountCanvas(); 
  cancelAnimationFrame(_vizRaf); 
  _vizRaf = null; 
  vizDraw(); 
}

function vizDraw() {
  if(!_vizCanvas || !_vizCtx) return; 
  const W = _vizCanvas.width;
  const H = _vizCanvas.height;
  const cover = document.getElementById('musicCover');
  const p = document.getElementById('panel-music');
  
  let cx = W/2, cy = H*0.34; 
  if(cover && p) {
    const c = cover.getBoundingClientRect();
    const r = p.getBoundingClientRect(); 
    cx = c.left + c.width/2 - r.left; 
    cy = c.top + c.height/2 - r.top;
  }
  
  const innerR = (cover ? cover.offsetWidth : 160)/2 * 1.15;
  const maxH = Math.min(W,H) * 0.25;

  if(_vizAnalyser){ 
    _vizAnalyser.getByteFrequencyData(_byteDataArr); 
    _vizAnalyser.getFloatTimeDomainData(_floatWaveArr); 
  }
  
  const binStep = Math.max(1, Math.floor((_byteDataArr.length*0.75)/VIZ_BARS));
  const accentRaw = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#6C63FF';
  const accentRGB = vizHexRGB(accentRaw);
  
  // ── SYNERGY: TONE MODIFIER ──
  // Default hiRGB is inverted accent
  let hiRGB = [Math.max(0, 255-accentRGB[0]), accentRGB[2], accentRGB[1]]; 
  if (_currentTone === 'bright') hiRGB = [255, 255, 255]; // Max contrast, blazing white
  if (_currentTone === 'muffled') hiRGB = [accentRGB[0]*0.8, accentRGB[1]*0.8, accentRGB[2]*0.8]; // Warm, dark monochrome

  let bassEnergy = 0; 
  for(let i=0; i<VIZ_BARS; i++) { 
    let sum = 0; 
    for(let b=0; b<binStep; b++) {
      sum += (_byteDataArr[i*binStep+b] || 0); 
    }
    _vizSmoothData[i] += ((sum/(binStep*255)) - _vizSmoothData[i]) * 0.28; 
    if(i < 6) bassEnergy += _byteDataArr[i]; 
  } 
  bassEnergy /= 6;
  
  _beatHistory[_beatIdx % 43] = bassEnergy; 
  _beatIdx++; 
  
  let beatAvg = 0; 
  for(let i=0; i<43; i++) {
    beatAvg += _beatHistory[i]; 
  }
  beatAvg /= 43;
  
  const pb = _isBeat; 
  _isBeat = isPlaying && bassEnergy > beatAvg * 1.45 && bassEnergy > 30; 
  if(_isBeat && !pb) _beatPulse = 1.0; 

  // ── SYNERGY: RHYTHM MODIFIER ──
  let pulseDecay = 0.86;
  let particleSpeed = 1.0;
  if (_currentRhythm === 'smooth') { pulseDecay = 0.94; particleSpeed = 0.3; } // Linger long, move slow
  if (_currentRhythm === 'punchy') { pulseDecay = 0.78; particleSpeed = 2.2; } // Drop fast, shoot hard
  _beatPulse *= pulseDecay;

  if(isPlaying) _ringRotation += 0.0018 + bassEnergy * 0.000015; 
  _idlePhase += 0.025;
  
  _vizCtx.clearRect(0,0,W,H); 
  _vizCtx.globalCompositeOperation = 'source-over';
  
  if(cover){
    cover.style.transform = `scale(${1 + _beatPulse*0.05})`;
    cover.style.transition = _beatPulse > 0.05 ? 'none' : 'transform 0.3s ease';
  }

  if(_vizMode !== 'galaxy') {
    const grd = _vizCtx.createRadialGradient(cx, cy, innerR*(1.0+_beatPulse*0.04)*0.85, cx, cy, innerR*(1.0+_beatPulse*0.04)*1.18); 
    grd.addColorStop(0, vizHexToRgba(accentRaw, isPlaying ? Math.min(0.55, (bassEnergy/255)*0.7 + _beatPulse*0.35) : 0.06)); 
    grd.addColorStop(1, vizHexToRgba(accentRaw, 0));
    _vizCtx.beginPath(); 
    _vizCtx.arc(cx, cy, innerR*(1.0+_beatPulse*0.04)*1.18, 0, Math.PI*2); 
    _vizCtx.fillStyle = grd; 
    _vizCtx.fill();
  }

  if(_vizMode === 'circular') {
    const pts = [];
    for(let i=0; i<VIZ_BARS; i++){
      const ft = i/VIZ_BARS;
      const h = isPlaying ? Math.max(2, _vizSmoothData[i]*maxH) : maxH*0.15*(0.5+0.5*Math.sin(_idlePhase+ft*Math.PI*4));
      const a = (i/VIZ_BARS)*Math.PI*2 - Math.PI/2 + _ringRotation;
      
      if(isPlaying) {
        _peakHeights[i] = h > _peakHeights[i] ? h : _peakHeights[i]*0.97; 
      } else {
        _peakHeights[i] *= 0.96;
      }
      
      if(_isBeat && _vizSmoothData[i] > 0.68 && isPlaying && Math.random() < 0.28){
        const td = innerR + h;
        const c = Math.cos(a), s = Math.sin(a);
        for(let p=0; p<3; p++){ 
          _particles.push({
            x: cx + c*td, 
            y: cy + s*td,
            vx: (c*(0.6+Math.random()*1.2) + Math.cos(a+Math.PI/2)*(Math.random()-0.5)*0.6) * particleSpeed, 
            vy: (s*(0.6+Math.random()*1.2) + Math.sin(a+Math.PI/2)*(Math.random()-0.5)*0.6) * particleSpeed, 
            life: 1.0, 
            size: 1.2+Math.random()*2.2
          }); 
        }
      }
      pts.push({x: cx + Math.cos(a)*(innerR+h), y: cy + Math.sin(a)*(innerR+h), a, ft});
    }
    
    _vizCtx.beginPath(); 
    pts.forEach((p,i) => { i===0 ? _vizCtx.moveTo(p.x, p.y) : _vizCtx.lineTo(p.x, p.y); }); 
    _vizCtx.closePath(); 
    _vizCtx.lineWidth = 2.5; 
    _vizCtx.strokeStyle = vizHexToRgba(accentRaw, 0.9); 
    _vizCtx.stroke(); 
    _vizCtx.fillStyle = vizHexToRgba(accentRaw, 0.15); 
    _vizCtx.fill();
    
    if(isPlaying){ 
      _vizCtx.globalCompositeOperation = 'screen'; 
      for(let i=0; i<VIZ_BARS; i++){
        if(_peakHeights[i] > 4){ 
          _vizCtx.fillStyle = vizLerpColor(accentRGB, hiRGB, pts[i].ft, 0.9); 
          _vizCtx.beginPath(); 
          _vizCtx.arc(cx+Math.cos(pts[i].a)*(innerR+_peakHeights[i]), cy+Math.sin(pts[i].a)*(innerR+_peakHeights[i]), 1.8, 0, Math.PI*2); 
          _vizCtx.fill(); 
        }
      } 
      _vizCtx.globalCompositeOperation = 'source-over'; 
    }
  } else if(_vizMode === 'wave') {
    const h = H*0.28, st = W/_floatWaveArr.length; 
    _vizCtx.save(); 
    _vizCtx.lineJoin = 'round'; 
    _vizCtx.lineCap = 'round'; 
    _vizCtx.globalCompositeOperation = 'screen';
    
    _vizCtx.beginPath(); 
    for(let i=0; i<_floatWaveArr.length; i++){ 
      i===0 ? _vizCtx.moveTo(i*st, cy+_floatWaveArr[i]*h) : _vizCtx.lineTo(i*st, cy+_floatWaveArr[i]*h); 
    } 
    _vizCtx.lineWidth = 1.5; 
    _vizCtx.strokeStyle = `rgba(${hiRGB[0]},${hiRGB[1]},${hiRGB[2]},0.9)`; 
    _vizCtx.stroke();
    
    _vizCtx.lineWidth = 4; 
    _vizCtx.strokeStyle = vizHexToRgba(accentRaw, 0.7); 
    _vizCtx.stroke(); 
    
    _vizCtx.lineWidth = 12; 
    _vizCtx.strokeStyle = vizHexToRgba(accentRaw, 0.25); 
    _vizCtx.stroke(); 
    _vizCtx.restore();
  } else if(_vizMode === 'mirror') {
    const bw = W/90, bA = isPlaying ? 0.9 : 0.15;
    for(let i=0; i<90; i++){
      const di = Math.floor(Math.abs(45-i)/45*(VIZ_BARS*0.8));
      const n = _vizSmoothData[di] || 0;
      const ft = di/VIZ_BARS;
      const h = isPlaying ? Math.max(2, n*maxH) : maxH*0.15*(0.4+0.6*Math.abs(Math.sin(_idlePhase+ft*Math.PI*3)));
      const x = i*bw+2;
      const w = bw-4;
      
      const g1 = _vizCtx.createLinearGradient(0,cy,0,cy-h); 
      g1.addColorStop(0, vizLerpColor(accentRGB, hiRGB, ft, bA)); 
      g1.addColorStop(1, vizLerpColor(accentRGB, hiRGB, ft, 0)); 
      _vizCtx.fillStyle = g1; 
      _vizCtx.beginPath(); 
      _vizCtx.roundRect(x,cy-h,w,h,[3,3,0,0]); 
      _vizCtx.fill();
      
      const g2 = _vizCtx.createLinearGradient(0,cy,0,cy+h); 
      g2.addColorStop(0, vizLerpColor(accentRGB, hiRGB, ft, bA*0.65)); 
      g2.addColorStop(1, vizLerpColor(accentRGB, hiRGB, ft, 0)); 
      _vizCtx.fillStyle = g2; 
      _vizCtx.beginPath(); 
      _vizCtx.roundRect(x,cy,w,h,[0,0,3,3]); 
      _vizCtx.fill();
    }
    if(_beatPulse > 0.1){ 
      _vizCtx.globalCompositeOperation = 'screen'; 
      _vizCtx.globalAlpha = _beatPulse * 0.4; 
      _vizCtx.fillStyle = accentRaw; 
      _vizCtx.fillRect(0, cy-2, W, 4); 
      _vizCtx.globalAlpha = 1; 
      _vizCtx.globalCompositeOperation = 'source-over'; 
    }
  } else if(_vizMode === 'galaxy') {
    _vizCtx.globalCompositeOperation = 'screen'; 
    const fl = W*0.8;
    const ws = isPlaying ? (_isBeat ? 25*particleSpeed : 2+bassEnergy/255*8*particleSpeed) : 0.5;
    
    for(let i=0; i<_stars.length; i++){
      const s = _stars[i]; 
      s.z -= ws; 
      if(s.z <= 0){ s.x = (Math.random()-0.5)*W*2; s.y = (Math.random()-0.5)*H*2; s.z = W; } 
      const sc = fl/s.z; 
      s.twinkle += 0.05;
      
      _vizCtx.beginPath(); 
      _vizCtx.arc(cx+s.x*sc, cy+s.y*sc, Math.max(0.1, (1-s.z/W)*2.5), 0, Math.PI*2); 
      _vizCtx.fillStyle = vizHexToRgba(accentRaw, (0.5+0.5*Math.abs(Math.sin(s.twinkle)))*(sc*0.5)); 
      _vizCtx.fill();
    }
    _vizCtx.globalCompositeOperation = 'source-over';
    
    const grd = _vizCtx.createRadialGradient(cx,cy,0,cx,cy,innerR*0.95); 
    grd.addColorStop(0, vizHexToRgba(accentRaw, isPlaying ? bassEnergy/255*0.7+_beatPulse*0.5 : 0.08+0.04*Math.sin(_idlePhase))); 
    grd.addColorStop(1, vizHexToRgba(accentRaw, 0)); 
    _vizCtx.beginPath(); 
    _vizCtx.arc(cx,cy,innerR*0.95,0,Math.PI*2); 
    _vizCtx.fillStyle = grd; 
    _vizCtx.fill();
  }

  // Draw Particles
  if(_vizMode === 'circular' || _vizMode === 'galaxy'){
    _vizCtx.globalCompositeOperation = 'screen';
    for(let i=_particles.length-1; i>=0; i--){
      const p = _particles[i]; 
      p.x += p.vx; 
      p.y += p.vy; 
      p.vx *= 0.93; 
      p.vy *= 0.93; 
      p.life -= 0.032; 
      if(p.life <= 0){ _particles.splice(i,1); continue; }
      
      _vizCtx.beginPath(); 
      _vizCtx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); 
      _vizCtx.fillStyle = vizHexToRgba(accentRaw, p.life*0.9); 
      _vizCtx.fill();
    }
    _vizCtx.globalCompositeOperation = 'source-over';
  }

  _vizRaf = requestAnimationFrame(vizDraw);
}

initMusic(); 
setTimeout(vizMountCanvas, 80); 
window.addEventListener('resize', () => { 
  if(document.getElementById('panel-music').classList.contains('active')) vizMountCanvas(); 
});

/* ══════════════════════════════════════════════
   REMINDERS
══════════════════════════════════════════════ */
let reminders = LS.get('reminders') || [];

function saveReminders() { LS.set('reminders', reminders); }

function addReminder() { 
  const txt = document.getElementById('remText').value.trim();
  const tm = document.getElementById('remTime').value; 
  if(!txt || !tm) return; 
  reminders.push({id: Date.now(), text: txt, time: tm, fired: false}); 
  saveReminders(); 
  renderReminders(); 
}

function deleteReminder(id) { 
  reminders = reminders.filter(r => r.id !== id); 
  saveReminders(); 
  renderReminders(); 
}

function renderReminders() {
  const list = document.getElementById('remList');
  const sorted = [...reminders].sort((a,b) => a.time.localeCompare(b.time));
  const u = reminders.filter(r => !r.fired).length; 
  
  document.getElementById('remBadge').style.display = u ? '' : 'none'; 
  document.getElementById('remBadge').textContent = u;
  
  if(!sorted.length) {
    list.innerHTML = `<div class="empty"><p>No reminders set.</p></div>`;
  } else {
    list.innerHTML = sorted.map(r => `
      <li class="rem-item ${r.fired ? 'fired' : ''}">
        <span class="rem-time">${r.time}</span>
        <span class="rem-text">${escHtml(r.text)}</span>
        <button class="rem-del" onclick="deleteReminder(${r.id})">×</button>
      </li>
    `).join('');
  }
}

setInterval(() => { 
  const hm = pad(new Date().getHours()) + ':' + pad(new Date().getMinutes()); 
  reminders.forEach(r => {
    if(!r.fired && r.time === hm) {
      r.fired = true;
      showNotif(r.text);
      if(Notification.permission === 'granted') new Notification('Focus', {body: r.text});
    }
  }); 
  saveReminders(); 
  renderReminders(); 
}, 15000); 

renderReminders();

function reqNotifPerm() { 
  if('Notification' in window) Notification.requestPermission().then(p => showNotif(p === 'granted' ? 'Alerts enabled' : 'Denied')); 
}

let notifTimeout; 
function showNotif(m) { 
  const b = document.getElementById('notifBanner'); 
  document.getElementById('notifText').textContent = m; 
  b.classList.add('show'); 
  clearTimeout(notifTimeout); 
  notifTimeout = setTimeout(() => b.classList.remove('show'), 3500); 
}

/* ══════════════════════════════════════════════
   ANALYTICS
══════════════════════════════════════════════ */
let workChart = null;
async function loadAnalytics() {
  try {
    const res = await fetch('https://focus-companion.onrender.com/get_stats'); 
    const data = await res.json(); 
    if(!data.length) return;
    
    const g = {}; 
    data.forEach(s => { 
      const d = new Date(s.timestamp).toLocaleDateString('en-US', {month:'short', day:'numeric'}); 
      g[d] = (g[d] || 0) + s.duration_minutes; 
    });
    
    if(workChart) workChart.destroy();
    
    const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    workChart = new Chart(document.getElementById('workChart').getContext('2d'), { 
      type: 'bar', 
      data: {
        labels: Object.keys(g),
        datasets: [{
          label: 'Minutes',
          data: Object.values(g),
          backgroundColor: ac + '80',
          borderColor: ac,
          borderWidth: 2
        }]
      }, 
      options: { responsive: true, maintainAspectRatio: false } 
    });
  } catch(e) {}
}

const oST = switchTab; 
switchTab = function(n,b) { 
  oST(n,b); 
  if(n === 'analytics') loadAnalytics(); 
};
